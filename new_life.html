<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Favicon (emoji SVG — works everywhere) -->

  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />

</head>
<body style="margin:0;background:#080810;">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── API CONFIG ────────────────────────────────────────────────────────
       Paste your Anthropic API key below to enable AI features.
       Leave empty and AI responses will use friendly fallback text.
    ──────────────────────────────────────────────────────────────────────── */
    const ANTHROPIC_API_KEY = "";

    // ─── GLOBAL STYLES ────────────────────────────────────────────────────────
    const GlobalStyles = () => (
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: #080810; font-family: 'DM Sans', sans-serif; }
        ::-webkit-scrollbar { width: 0; }
        input, textarea, select { font-family: 'DM Sans', sans-serif; }
        button { font-family: 'DM Sans', sans-serif; }

        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        @keyframes floatR { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(3deg)} }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.7;transform:scale(0.96)} }
        @keyframes ripple { 0%{transform:translate(-50%,-50%) scale(0);opacity:0.5} 100%{transform:translate(-50%,-50%) scale(10);opacity:0} }
        @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideIn { from{opacity:0;transform:translateX(32px)} to{opacity:1;transform:translateX(0)} }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes spin { to{transform:rotate(360deg)} }
        @keyframes blobMorph { 0%,100%{border-radius:60% 40% 30% 70%/60% 30% 70% 40%} 50%{border-radius:30% 60% 70% 40%/50% 60% 30% 60%} }
        @keyframes micPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,0.4)} 50%{box-shadow:0 0 0 24px rgba(255,107,107,0)} }
        @keyframes confettiFall { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(80px) rotate(720deg);opacity:0} }
        @keyframes streakGlow { 0%,100%{box-shadow:0 0 20px rgba(255,140,66,0.3)} 50%{box-shadow:0 0 40px rgba(255,140,66,0.7)} }
        @keyframes scoreCount { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
        @keyframes waveBar { 0%,100%{transform:scaleY(0.3)} 50%{transform:scaleY(1)} }
        @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

        .btn-press:active { transform: scale(0.96) !important; }
        .card-hover:hover { border-color: rgba(255,255,255,0.15) !important; transform: translateY(-2px); transition: all 0.2s ease; }

        input[type=range] { -webkit-appearance:none; width:100%; height:6px; border-radius:3px; background:linear-gradient(to right,#ff8c42,#ff6b6b); outline:none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 2px 12px rgba(255,140,66,0.5); cursor:pointer; }
        input[type=time], input[type=date] { color-scheme:dark; }

        .tab-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(12,12,20,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.06); padding:8px 0 20px; display:flex; justify-content:space-around; z-index:1000; overflow-x:auto; scrollbar-width:none; -webkit-mask-image:linear-gradient(to right, black 85%, transparent 100%); mask-image:linear-gradient(to right, black 85%, transparent 100%); }
        .tab-bar::-webkit-scrollbar { display:none; }
        .tab-item { display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; padding:6px 10px; border-radius:12px; transition:all 0.2s; border:none; background:none; flex-shrink:0; }
        .tab-icon { font-size:20px; }
        .tab-label { font-size:9px; font-family:'Syne',sans-serif; font-weight:600; letter-spacing:0.04em; }

        .metric-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07); border-radius:20px; padding:16px; transition:all 0.2s; }
        .section-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:12px; }

        .achievement-shine { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); background-size:200% 100%; animation: shimmer 2s infinite; }
      `}</style>
    );

    // ─── THEME & CONSTANTS ────────────────────────────────────────────────────
    const C = {
      bg: "#080810",
      surface: "rgba(255,255,255,0.04)",
      border: "rgba(255,255,255,0.07)",
      borderHover: "rgba(255,255,255,0.15)",
      text: "#f0f0f8",
      textMuted: "rgba(255,255,255,0.4)",
      textDim: "rgba(255,255,255,0.2)",
      orange: "#ff8c42",
      red: "#ff6b6b",
      green: "#4ecb8d",
      blue: "#5b8def",
      yellow: "#ffd166",
      grad: "linear-gradient(135deg, #ff8c42, #ff6b6b)",
      gradGreen: "linear-gradient(135deg, #4ecb8d, #2dd4bf)",
      gradBlue: "linear-gradient(135deg, #5b8def, #8b5cf6)",
      gradYellow: "linear-gradient(135deg, #ffd166, #ff8c42)",
    };

    // ─── SHARED COMPONENTS ────────────────────────────────────────────────────
    const Screen = ({ children, style = {} }) => (
      <div style={{ minHeight: "100vh", background: C.bg, paddingBottom: 90, position: "relative", overflow: "hidden", ...style }}>
        <div style={{ position: "fixed", top: -100, right: -80, width: 300, height: 300, borderRadius: "50%", background: "radial-gradient(circle, rgba(255,140,66,0.08) 0%, transparent 70%)", pointerEvents: "none", zIndex: 0 }} />
        <div style={{ position: "fixed", bottom: 80, left: -60, width: 250, height: 250, borderRadius: "50%", background: "radial-gradient(circle, rgba(78,203,141,0.06) 0%, transparent 70%)", pointerEvents: "none", zIndex: 0 }} />
        <div style={{ position: "relative", zIndex: 1 }}>{children}</div>
      </div>
    );

    const Card = ({ children, style = {}, glow }) => (
      <div className="metric-card card-hover" style={{ ...(glow ? { borderColor: `${glow}30`, boxShadow: `0 0 20px ${glow}15` } : {}), ...style }}>
        {children}
      </div>
    );

    const GradBtn = ({ children, onClick, style = {}, grad = C.grad, disabled }) => (
      <button className="btn-press" onClick={onClick} disabled={disabled} style={{ background: disabled ? "rgba(255,255,255,0.08)" : grad, border: "none", borderRadius: 14, padding: "15px 24px", color: disabled ? "rgba(255,255,255,0.3)" : "#fff", fontFamily: "'Syne', sans-serif", fontWeight: 700, fontSize: 15, cursor: disabled ? "not-allowed" : "pointer", width: "100%", transition: "all 0.2s", letterSpacing: "0.02em", ...style }}>
        {children}
      </button>
    );

    const Tag = ({ children, color = C.orange }) => (
      <span style={{ background: `${color}18`, border: `1px solid ${color}30`, color, borderRadius: 100, padding: "4px 10px", fontSize: 11, fontWeight: 600, fontFamily: "'Syne',sans-serif", letterSpacing: "0.05em" }}>
        {children}
      </span>
    );

    const Avatar = ({ emoji = "😊", size = 48, glow }) => (
      <div style={{ width: size, height: size, borderRadius: "50%", background: "rgba(255,255,255,0.06)", border: `1px solid rgba(255,255,255,0.1)`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.5, flexShrink: 0, ...(glow ? { boxShadow: `0 0 20px ${glow}40` } : {}) }}>
        {emoji}
      </div>
    );

    const ProgressBar = ({ value, max = 100, color = C.orange, height = 6 }) => (
      <div style={{ width: "100%", height, background: "rgba(255,255,255,0.06)", borderRadius: height / 2, overflow: "hidden" }}>
        <div style={{ width: `${Math.min((value / max) * 100, 100)}%`, height: "100%", background: color, borderRadius: height / 2, transition: "width 0.6s cubic-bezier(0.4,0,0.2,1)" }} />
      </div>
    );

    const MoodFace = ({ score, size = 48 }) => {
      const face = score >= 80 ? { emoji: "😄", color: C.green, label: "Excellent" } : score >= 60 ? { emoji: "🙂", color: C.blue, label: "Good" } : score >= 40 ? { emoji: "😐", color: C.yellow, label: "Average" } : score >= 20 ? { emoji: "😟", color: C.orange, label: "Poor" } : { emoji: "😞", color: C.red, label: "Bad" };
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{ width: size, height: size, borderRadius: "50%", background: `${face.color}18`, border: `2px solid ${face.color}40`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: size * 0.55 }}>{face.emoji}</div>
          <span style={{ fontSize: 10, color: face.color, fontFamily: "'Syne',sans-serif", fontWeight: 700, letterSpacing: "0.05em" }}>{face.label}</span>
        </div>
      );
    };

    const Ring = ({ value, max = 100, size = 80, color = C.orange, label, sublabel }) => {
      const r = (size - 10) / 2;
      const circ = 2 * Math.PI * r;
      const fill = circ - (Math.min(value / max, 1) * circ);
      return (
        <div style={{ position: "relative", width: size, height: size, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <svg width={size} height={size} style={{ position: "absolute", transform: "rotate(-90deg)" }}>
            <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={8} />
            <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth={8} strokeDasharray={circ} strokeDashoffset={fill} strokeLinecap="round" style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)" }} />
          </svg>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontFamily: "'Syne',sans-serif", fontWeight: 800, fontSize: size * 0.22, color: C.text }}>{label}</div>
            {sublabel && <div style={{ fontSize: size * 0.13, color: C.textMuted }}>{sublabel}</div>}
          </div>
        </div>
      );
    };

    // ─── APP STATE ────────────────────────────────────────────────────────────
    // ── localStorage helpers ──────────────────────────────────────────────────
    const nlGet = (key, fallback) => {
      try { const v = localStorage.getItem('nl_' + key); return v !== null ? JSON.parse(v) : fallback; }
      catch { return fallback; }
    };
    const nlSet = (key, val) => { try { localStorage.setItem('nl_' + key, JSON.stringify(val)); } catch {} };
    const nlSave = (state) => { try { localStorage.setItem('nl_data', JSON.stringify(state)); } catch {} };
    const nlLoad = () => { try { return JSON.parse(localStorage.getItem('nl_data') || 'null'); } catch { return null; } };

    const useAppState = () => {
      const _saved = React.useMemo(() => nlLoad() || {}, []);

      const [user, setUser] = useState(() => _saved.user || null);
      const [activeTab, setActiveTab] = useState("home");
      const [todayMood, setTodayMood] = useState(() => _saved.todayMood ?? null);
      const [todayStress, setTodayStress] = useState(() => _saved.todayStress ?? null);
      const [todaySleep, setTodaySleep] = useState(() => _saved.todaySleep ?? null);

      const DEFAULT_TASKS = [
        { id: 1, text: "Morning workout", done: false, priority: "high", time: "30 min" },
        { id: 2, text: "Review project proposal", done: false, priority: "high", time: "45 min" },
        { id: 3, text: "Call with mentor", done: true, priority: "medium", time: "20 min" },
        { id: 4, text: "Read for 20 minutes", done: false, priority: "low", time: "20 min" },
      ];
      const DEFAULT_MEALS = [
        { id: 1, name: "Oats with banana", calories: 320, type: "breakfast", macros: { p: 8, c: 58, f: 6 }, quality: "healthy", time: "8:00 AM" },
        { id: 2, name: "Chicken salad", calories: 420, type: "lunch", macros: { p: 38, c: 22, f: 14 }, quality: "healthy", time: "1:00 PM" },
      ];
      const DEFAULT_HABITS = [
        { id: 1, name: "Morning walk", done: false, emoji: "🚶" },
        { id: 2, name: "No phone before 8am", done: false, emoji: "📵" },
        { id: 3, name: "Read 10 pages", done: false, emoji: "📚" },
        { id: 4, name: "Meditate 5 min", done: false, emoji: "🧘" },
        { id: 5, name: "Drink 8 glasses", done: false, emoji: "💧" },
      ];
      const DEFAULT_ACHIEVEMENTS = [
        { id: 1, name: "First Step", emoji: "👣", desc: "Opened the app for the first time", unlocked: true, secret: false, note: "Every journey starts with a single step." },
        { id: 2, name: "Week Warrior", emoji: "🔥", desc: "7-day streak", unlocked: false, secret: false, note: "You showed up every single day. That's discipline." },
        { id: 3, name: "Hydration Hero", emoji: "💧", desc: "Hit water goal 5 days in a row", unlocked: false, secret: false, note: "Your body thanks you." },
        { id: 4, name: "Early Bird", emoji: "🌅", desc: "Opened app before 7am", unlocked: false, secret: true, note: "The world is quieter in the morning. You found that." },
        { id: 5, name: "Mindful Eater", emoji: "🥗", desc: "Logged all meals for 7 days", unlocked: false, secret: false, note: "Awareness is the first step to change." },
        { id: 6, name: "Stress Slayer", emoji: "🧘", desc: "Reduced stress score by 30%", unlocked: false, secret: true, note: "Inner peace is the ultimate achievement." },
        { id: 7, name: "Deep Worker", emoji: "🎯", desc: "4 hours of focus in one day", unlocked: false, secret: false, note: "Cal Newport would be proud." },
        { id: 8, name: "The Comeback", emoji: "💙", desc: "Returned after a 3-day absence", unlocked: false, secret: true, note: "Coming back is harder than starting. You did it." },
      ];
      const DEFAULT_WORKOUTS = [
        { id: 1, type: "Run",  emoji: "🏃", duration: 30, intensity: "Medium", calories: 280, date: "Today",      time: "7:00 AM" },
        { id: 2, type: "Yoga", emoji: "🧘", duration: 20, intensity: "Easy",   calories: 120, date: "Yesterday",  time: "6:30 AM" },
        { id: 3, type: "Lift", emoji: "🏋️", duration: 45, intensity: "Hard",   calories: 380, date: "2 days ago", time: "5:45 PM" },
        { id: 4, type: "HIIT", emoji: "⚡", duration: 25, intensity: "Hard",   calories: 310, date: "4 days ago", time: "7:15 AM" },
        { id: 5, type: "Walk", emoji: "🚶", duration: 40, intensity: "Easy",   calories: 180, date: "5 days ago", time: "8:00 AM" },
      ];
      const DEFAULT_SLEEP = [
        { id: 1, bedtime: "23:00", wake: "07:00", duration: 8.0,  quality: 4, date: "Last night" },
        { id: 2, bedtime: "23:30", wake: "06:30", duration: 7.0,  quality: 3, date: "2 days ago" },
        { id: 3, bedtime: "22:45", wake: "07:15", duration: 8.5,  quality: 5, date: "3 days ago" },
        { id: 4, bedtime: "00:00", wake: "06:00", duration: 6.0,  quality: 2, date: "4 days ago" },
        { id: 5, bedtime: "23:15", wake: "07:00", duration: 7.75, quality: 4, date: "5 days ago" },
        { id: 6, bedtime: "23:00", wake: "07:30", duration: 8.5,  quality: 5, date: "6 days ago" },
        { id: 7, bedtime: "23:45", wake: "07:15", duration: 7.5,  quality: 3, date: "7 days ago" },
      ];

      const [tasks,          setTasks]          = useState(() => _saved.tasks          || DEFAULT_TASKS);
      const [meals,          setMeals]          = useState(() => _saved.meals          || DEFAULT_MEALS);
      const [water,          setWater]          = useState(() => _saved.water          ?? 0);
      const [streak,         setStreak]         = useState(() => _saved.streak         ?? 0);
      const [habits,         setHabits]         = useState(() => _saved.habits         || DEFAULT_HABITS);
      const [achievements,   setAchievements]   = useState(() => _saved.achievements   || DEFAULT_ACHIEVEMENTS);
      const [journalEntries, setJournalEntries] = useState(() => _saved.journalEntries || []);
      const [stressLog,      setStressLog]      = useState(() => _saved.stressLog      || [5, 5, 5, 5, 5, 5, 5]);
      const [moodLog,        setMoodLog]        = useState(() => _saved.moodLog        || [70, 65, 70, 65, 70, 70, 70]);
      const [calorieLog,     setCalorieLog]     = useState(() => _saved.calorieLog     || [0, 0, 0, 0, 0, 0, 0]);
      const [friends,        setFriends]        = useState(() => _saved.friends        || [
        { id: 1, name: "Priya", avatar: "👩", streak: 8,  goal: "Run 5km daily",        shared: true,  today: "Hit her goal! 🎉" },
        { id: 2, name: "Arjun", avatar: "👨", streak: 15, goal: "No sugar for 30 days", shared: true,  today: "Day 15 strong 💪" },
        { id: 3, name: "Meera", avatar: "🧑", streak: 3,  goal: "Sleep by 11pm",        shared: false, today: null },
      ]);
      const [notifications,  setNotifications]  = useState(() => _saved.notifications || [
        { id: 1, text: "Good morning! How are you feeling today? 🌅", time: "8:00 AM", read: false },
        { id: 2, text: "Your friend Arjun completed his goal today! 🎉", time: "10:30 AM", read: false },
        { id: 3, text: "Lunchtime! Want to log what you had? 🍽️", time: "1:00 PM", read: true },
      ]);
      const [workouts,  setWorkouts]  = useState(() => _saved.workouts  || DEFAULT_WORKOUTS);
      const [sleepLogs, setSleepLogs] = useState(() => _saved.sleepLogs || DEFAULT_SLEEP);
      const [focusTime,   setFocusTime]   = useState(0);
      const [focusActive, setFocusActive] = useState(false);

      const totalCalories = meals.reduce((s, m) => s + m.calories, 0);
      const calorieGoal = (user && user.calorieGoal) ? user.calorieGoal : 2000;
      const waterGoal   = (user && user.waterGoal)   ? user.waterGoal   : 8;
      const tasksDone  = tasks.filter(t => t.done).length;
      const habitsDone = habits.filter(h => h.done).length;

      // Dynamic life score (recalculates from real data every render)
      const lifeScore = React.useMemo(() => {
        const moodScore    = todayMood   ? todayMood                           : (moodLog[moodLog.length-1] || 65);
        const stressScore  = todayStress ? Math.max(0, 100 - todayStress * 10): (100 - (stressLog[stressLog.length-1]||5) * 10);
        const sleepScore   = sleepLogs.length ? Math.min(100, (sleepLogs[0].duration / 8) * 100) : 65;
        const taskScore    = tasks.length   ? (tasksDone  / tasks.length)   * 100 : 50;
        const habitScore   = habits.length  ? (habitsDone / habits.length)  * 100 : 50;
        const waterScore   = Math.min(100, (water / waterGoal) * 100);
        const raw = moodScore * 0.25 + stressScore * 0.2 + sleepScore * 0.2 + taskScore * 0.1 + habitScore * 0.15 + waterScore * 0.1;
        return Math.round(Math.max(0, Math.min(100, raw)));
      }, [todayMood, todayStress, moodLog, stressLog, sleepLogs, tasks, tasksDone, habits, habitsDone, water, waterGoal]);

      // Persist all state to localStorage on any change
      useEffect(() => {
        nlSave({
          user, tasks, meals, water, streak, habits, achievements,
          journalEntries, stressLog, moodLog, calorieLog,
          friends, notifications, workouts, sleepLogs,
          todayMood, todayStress, todaySleep,
        });
      }, [user, tasks, meals, water, streak, habits, achievements,
          journalEntries, stressLog, moodLog, calorieLog,
          friends, notifications, workouts, sleepLogs,
          todayMood, todayStress, todaySleep]);

      return {
        user, setUser, activeTab, setActiveTab,
        todayMood, setTodayMood, todayStress, setTodayStress, todaySleep, setTodaySleep,
        tasks, setTasks, meals, setMeals, water, setWater, streak, setStreak,
        habits, setHabits, achievements, setAchievements,
        journalEntries, setJournalEntries,
        stressLog, setStressLog, moodLog, setMoodLog, calorieLog, setCalorieLog, lifeScore,
        friends, setFriends, focusTime, setFocusTime, focusActive, setFocusActive,
        notifications, setNotifications,
        totalCalories, calorieGoal, waterGoal, tasksDone, habitsDone,
        workouts, setWorkouts, sleepLogs, setSleepLogs,
      };
    };

    // ─── ONBOARDING ───────────────────────────────────────────────────────────
    const ONBOARDING_QUESTIONS = [
      { id: "name", q: "Hey there! What should I call you?", sub: "Every message will be personal to you", type: "text", placeholder: "Your name...", emoji: "👋" },
      { id: "age", q: "How old are you?", sub: "Helps us set the right goals for you", type: "number", placeholder: "Your age...", emoji: "🎂" },
      { id: "gender", q: "What's your gender?", sub: "For personalized health recommendations", type: "choice", emoji: "🌟", opts: ["Male", "Female", "Non-binary", "Prefer not to say"] },
      { id: "diet", q: "How would you describe your current diet?", sub: "Be honest — this is just the starting point", type: "choice", emoji: "🥗", opts: ["Healthy", "Average", "Could be better", "Very unhealthy"] },
      { id: "fitness", q: "How active are you right now?", sub: "We'll build from wherever you are today", type: "choice", emoji: "💪", opts: ["Sedentary", "Lightly Active", "Moderately Active", "Very Active"] },
      { id: "sleep", q: "Hours of sleep you usually get?", sub: "Sleep is the foundation of everything", type: "slider", emoji: "😴", min: 3, max: 12, def: 7 },
      { id: "track", q: "What do you want to track?", sub: "Pick everything that matters to you", type: "multi", emoji: "📊", opts: ["Calories", "Stress", "Sleep", "Workouts", "Habits", "Supplements", "Water", "Mood"] },
      { id: "wakeup", q: "What time do you usually wake up?", sub: "We'll time your morning check-in just right", type: "time", emoji: "🌅", def: "07:00" },
      { id: "goal", q: "What's your #1 goal right now?", sub: "Write it in your own words", type: "textarea", placeholder: "e.g. I want to feel less anxious and more in control...", emoji: "🎯" },
      { id: "partner", q: "Want an accountability partner?", sub: "Someone to share goals and keep each other on track", type: "choice", emoji: "🤝", opts: ["Yes, definitely!", "Maybe later", "No thanks"] },
    ];

    function OnboardingFlow({ onComplete }) {
      const [step, setStep] = useState(0);
      const [answers, setAnswers] = useState({});
      const [val, setVal] = useState("");
      const [sliderVal, setSliderVal] = useState(7);
      const [multiVal, setMultiVal] = useState([]);
      const [timeVal, setTimeVal] = useState("07:00");
      const [visible, setVisible] = useState(true);
      const [done, setDone] = useState(false);
      const inputRef = useRef();
      const q = ONBOARDING_QUESTIONS[step];
      const progress = step / ONBOARDING_QUESTIONS.length;

      // Pre-fill name from URL ?name= param on first load
      useEffect(() => {
        const urlName = new URLSearchParams(window.location.search).get("name");
        if (urlName && urlName.trim()) setVal(urlName.trim());
      }, []);

      useEffect(() => {
        const saved = answers[q.id];
        if (q.type === "text" || q.type === "number" || q.type === "textarea") {
          // On step 0 (name), keep URL-prefilled value if not yet answered
          if (q.id === "name") {
            const urlName = new URLSearchParams(window.location.search).get("name");
            setVal(saved || (urlName ? urlName.trim() : ""));
          } else {
            setVal(saved || "");
          }
        }
        else if (q.type === "slider") setSliderVal(saved || q.def);
        else if (q.type === "multi") setMultiVal(saved || []);
        else if (q.type === "time") setTimeVal(saved || q.def);
        setTimeout(() => inputRef.current?.focus?.(), 400);
      }, [step]);

      const getAnswer = () => {
        if (q.type === "slider") return sliderVal;
        if (q.type === "multi") return multiVal;
        if (q.type === "time") return timeVal;
        return val;
      };

      const canNext = () => {
        const a = getAnswer();
        if (!a) return false;
        if (Array.isArray(a)) return a.length > 0;
        return String(a).trim().length > 0;
      };

      const go = (choiceAns) => {
        const answer = choiceAns !== undefined ? choiceAns : getAnswer();
        const newAns = { ...answers, [q.id]: answer };
        setAnswers(newAns);
        setVisible(false);
        setTimeout(() => {
          if (step < ONBOARDING_QUESTIONS.length - 1) { setStep(s => s + 1); }
          else { setDone(true); }
          setVisible(true);
        }, 300);
      };

      const back = () => {
        if (step === 0) return;
        setVisible(false);
        setTimeout(() => { setStep(s => s - 1); setVisible(true); }, 300);
      };

      if (done) return <WelcomeScreen answers={answers} onStart={() => onComplete(answers)} />;

      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "20px", position: "relative", overflow: "hidden" }}>
          <GlobalStyles />
          {[
            { top: "-100px", right: "-60px", color: "rgba(255,140,66,0.12)" },
            { bottom: "-80px", left: "-40px", color: "rgba(78,203,141,0.1)" },
            { top: "40%", left: "-80px", color: "rgba(91,141,239,0.08)" },
          ].map((b, i) => (
            <div key={i} style={{ position: "absolute", width: 280, height: 280, borderRadius: "50%", background: `radial-gradient(circle, ${b.color} 0%, transparent 70%)`, top: b.top, right: b.right, bottom: b.bottom, left: b.left, pointerEvents: "none" }} />
          ))}

          <div style={{ width: "100%", maxWidth: 440, display: "flex", alignItems: "center", gap: 12, marginBottom: 20, zIndex: 1 }}>
            <button onClick={back} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.4)", fontSize: 20, cursor: step > 0 ? "pointer" : "default", opacity: step > 0 ? 1 : 0, width: 32 }}>←</button>
            <div style={{ flex: 1, height: 3, background: "rgba(255,255,255,0.07)", borderRadius: 2, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${progress * 100}%`, background: C.grad, borderRadius: 2, transition: "width 0.5s ease" }} />
            </div>
            <span style={{ fontSize: 11, color: C.textMuted, fontFamily: "'Syne',sans-serif", minWidth: 32, textAlign: "right" }}>{step + 1}/{ONBOARDING_QUESTIONS.length}</span>
          </div>

          <div style={{ fontSize: 48, marginBottom: 8, animation: "float 3s ease-in-out infinite", zIndex: 1 }}>{q.emoji}</div>

          <div style={{ width: "100%", maxWidth: 440, background: "rgba(255,255,255,0.03)", border: `1px solid ${C.border}`, borderRadius: 24, padding: "28px 24px", zIndex: 1, opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(16px)", transition: "all 0.3s ease" }}>
            <h2 style={{ fontFamily: "'Syne',sans-serif", fontSize: 21, fontWeight: 800, color: C.text, marginBottom: 8, lineHeight: 1.3 }}>{q.q}</h2>
            <p style={{ fontSize: 13, color: C.textMuted, marginBottom: 24, lineHeight: 1.6 }}>{q.sub}</p>

            {(q.type === "text" || q.type === "number") && (
              <input ref={inputRef} type={q.type} value={val} onChange={e => setVal(e.target.value)} onKeyDown={e => e.key === "Enter" && canNext() && go()} placeholder={q.placeholder}
                style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", color: C.text, fontSize: 16, outline: "none", marginBottom: 16 }} />
            )}

            {q.type === "textarea" && (
              <textarea ref={inputRef} value={val} onChange={e => setVal(e.target.value)} placeholder={q.placeholder} rows={4}
                style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", color: C.text, fontSize: 14, outline: "none", resize: "none", lineHeight: 1.6, marginBottom: 16 }} />
            )}

            {q.type === "choice" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {q.opts.map(opt => (
                  <button key={opt} className="btn-press" onClick={() => go(opt)}
                    style={{ padding: "13px 18px", background: "rgba(255,255,255,0.04)", border: `1px solid ${C.border}`, borderRadius: 12, color: "rgba(255,255,255,0.8)", fontSize: 14, cursor: "pointer", textAlign: "left", transition: "all 0.15s" }}>
                    {opt}
                  </button>
                ))}
              </div>
            )}

            {q.type === "multi" && (
              <>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
                  {q.opts.map(opt => {
                    const sel = multiVal.includes(opt);
                    return (
                      <button key={opt} className="btn-press" onClick={() => setMultiVal(sel ? multiVal.filter(o => o !== opt) : [...multiVal, opt])}
                        style={{ padding: "9px 14px", background: sel ? "rgba(78,203,141,0.12)" : "rgba(255,255,255,0.04)", border: `1px solid ${sel ? "rgba(78,203,141,0.4)" : C.border}`, borderRadius: 100, color: sel ? C.green : "rgba(255,255,255,0.7)", fontSize: 13, cursor: "pointer", transition: "all 0.15s" }}>
                        {sel ? "✓ " : ""}{opt}
                      </button>
                    );
                  })}
                </div>
                <GradBtn onClick={() => go()} disabled={!canNext()}>Continue →</GradBtn>
              </>
            )}

            {q.type === "slider" && (
              <>
                <div style={{ textAlign: "center", fontFamily: "'Syne',sans-serif", fontSize: 48, fontWeight: 800, color: C.orange, marginBottom: 16 }}>{sliderVal}h</div>
                <input type="range" min={q.min} max={q.max} value={sliderVal} onChange={e => setSliderVal(+e.target.value)} style={{ marginBottom: 8 }} />
                <div style={{ display: "flex", justifyContent: "space-between", color: C.textMuted, fontSize: 12, marginBottom: 8 }}><span>{q.min}h</span><span>{q.max}h</span></div>
                <div style={{ textAlign: "center", color: C.textMuted, fontSize: 13, marginBottom: 20 }}>
                  {sliderVal <= 5 ? "😓 Let's work on that" : sliderVal <= 6 ? "😐 Could be better" : sliderVal <= 8 ? "😊 That's solid!" : "🤩 Excellent!"}
                </div>
                <GradBtn onClick={() => go()}>Continue →</GradBtn>
              </>
            )}

            {q.type === "time" && (
              <>
                <input type="time" value={timeVal} onChange={e => setTimeVal(e.target.value)}
                  style={{ width: "100%", background: "rgba(255,255,255,0.05)", border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px", color: C.text, fontSize: 28, fontFamily: "'Syne',sans-serif", fontWeight: 700, outline: "none", textAlign: "center", marginBottom: 20 }} />
                <GradBtn onClick={() => go()}>Continue →</GradBtn>
              </>
            )}

            {(q.type === "text" || q.type === "number" || q.type === "textarea") && (
              <GradBtn onClick={() => go()} disabled={!canNext()}>Continue →</GradBtn>
            )}
          </div>
        </div>
      );
    }

    function WelcomeScreen({ answers, onStart }) {
      return (
        <div style={{ minHeight: "100vh", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, gap: 20 }}>
          <GlobalStyles />
          <div style={{ fontSize: 72, animation: "float 2s ease-in-out infinite" }}>🥰</div>
          <div style={{ textAlign: "center" }}>
            <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 8 }}>🎉 &nbsp; You're all set &nbsp; 🎉</div>
            <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 36, fontWeight: 800, color: C.text, lineHeight: 1.2 }}>
              Welcome,<br /><span style={{ background: C.grad, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{answers.name}!</span>
            </h1>
            <p style={{ color: C.textMuted, fontSize: 15, marginTop: 10, fontWeight: 300 }}>Let's build something great together. 💙</p>
          </div>
          <div style={{ width: "100%", maxWidth: 400, background: "rgba(255,255,255,0.03)", border: `1px solid ${C.border}`, borderRadius: 20, padding: 20, display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 11, color: C.textMuted, fontFamily: "'Syne',sans-serif", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 4 }}>Here's what I know about you</div>
            {[
              answers.goal && { emoji: "🎯", text: `Goal: "${answers.goal}"` },
              answers.fitness && { emoji: "💪", text: `Currently ${answers.fitness}` },
              answers.sleep && { emoji: "😴", text: `Getting ~${answers.sleep}h of sleep` },
              answers.diet && { emoji: "🥗", text: `Diet: ${answers.diet}` },
            ].filter(Boolean).map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <span style={{ fontSize: 18 }}>{item.emoji}</span>
                <span style={{ color: "rgba(255,255,255,0.7)", fontSize: 13, lineHeight: 1.5 }}>{item.text}</span>
              </div>
            ))}
          </div>
          <div style={{ width: "100%", maxWidth: 400 }}>
            <GradBtn onClick={onStart} style={{ fontSize: 17, padding: "18px", animation: "pulse 2s ease-in-out infinite" }}>Let's Go, {answers.name}! →</GradBtn>
          </div>
          <p style={{ fontSize: 12, color: C.textDim }}>Your journey starts right now. One day at a time. 🌱</p>
        </div>
      );
    }

    // ─── HOME SCREEN ──────────────────────────────────────────────────────────
    function HomeScreen({ state }) {

      const greetEmoji = hour < 12 ? "🌅" : hour < 17 ? "☀️" : "🌙";
      const unread = notifications.filter(n => !n.read).length;

      return (
        <Screen>
          <div style={{ padding: "56px 20px 20px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, animation: "slideUp 0.5s ease" }}>
              <div>
                <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 4 }}>{greetEmoji} {greeting}</div>
                <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 26, fontWeight: 800, color: C.text }}>{user?.name || "Friend"} 👋</h1>
              </div>
              <div style={{ display: "flex", gap: 10 }}>
                {unread > 0 && (
                  <div style={{ position: "relative" }}>
                    <div style={{ width: 40, height: 40, borderRadius: "50%", background: C.surface, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18, cursor: "pointer" }}>🔔</div>
                    <div style={{ position: "absolute", top: -2, right: -2, width: 16, height: 16, borderRadius: "50%", background: C.red, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 9, fontWeight: 700, color: "#fff", fontFamily: "'Syne',sans-serif" }}>{unread}</div>
                  </div>
                )}
                <div style={{ width: 40, height: 40, borderRadius: "50%", background: C.surface, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>😊</div>
              </div>
            </div>

            <Card style={{ marginBottom: 16, background: "linear-gradient(135deg, rgba(255,140,66,0.08), rgba(255,107,107,0.05))", borderColor: "rgba(255,140,66,0.2)", animation: "slideUp 0.6s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div className="section-title" style={{ marginBottom: 6 }}>Life Score</div>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 52, fontWeight: 800, color: C.orange, lineHeight: 1 }}>{lifeScore}</div>
                  <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>↑ 6 pts from yesterday</div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
                  <Ring value={lifeScore} size={90} color={lifeScore > 70 ? C.green : lifeScore > 50 ? C.yellow : C.red} label={`${lifeScore}`} sublabel="/100" />
                  <MoodFace score={lifeScore} size={36} />
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginTop: 16, paddingTop: 16, borderTop: `1px solid ${C.border}` }}>
                {[
                  { label: "Tasks", value: `${tasksDone}/${tasks.length}`, color: C.blue },
                  { label: "Calories", value: `${totalCalories}`, color: C.orange },
                  { label: "Stress", value: `${todayStress !== null ? todayStress : (stressLog[stressLog.length-1] || 5)}/10`, color: C.green },
                ].map(s => (
                  <div key={s.label} style={{ textAlign: "center" }}>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 18, fontWeight: 800, color: s.color }}>{s.value}</div>
                    <div style={{ fontSize: 10, color: C.textMuted }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </Card>

            <Card style={{ marginBottom: 16, background: "linear-gradient(135deg, rgba(255,140,66,0.1), rgba(255,107,107,0.07))", borderColor: "rgba(255,140,66,0.25)", animation: "slideUp 0.65s ease", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 36, animation: "streakGlow 2s ease-in-out infinite" }}>🔥</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800, color: C.text }}>{streak} Day Streak</div>
                <div style={{ fontSize: 12, color: C.textMuted }}>You're on fire! Keep showing up 💪</div>
              </div>
              <Tag color={C.orange}>+1 grace day</Tag>
            </Card>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16, animation: "slideUp 0.7s ease" }}>
              <Card glow={C.orange}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "'Syne',sans-serif", letterSpacing: "0.08em", textTransform: "uppercase" }}>Calories</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{totalCalories}</div>

                  </div>
                  <span style={{ fontSize: 24 }}>🍽️</span>
                </div>
                <ProgressBar value={totalCalories} max={calorieGoal} color={totalCalories > calorieGoal ? C.red : C.orange} />
              </Card>
              <Card glow={C.blue}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "'Syne',sans-serif", letterSpacing: "0.08em", textTransform: "uppercase" }}>Water</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{water} glasses</div>

                  <span style={{ fontSize: 24 }}>💧</span>
                </div>
                <ProgressBar value={water} max={waterGoal} color={C.blue} />
              </Card>
              <Card glow={C.green}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "'Syne',sans-serif", letterSpacing: "0.08em", textTransform: "uppercase" }}>Tasks</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{tasksDone}/{tasks.length}</div>
                    <div style={{ fontSize: 11, color: C.textMuted }}>Done today</div>
                  </div>
                  <span style={{ fontSize: 24 }}>✅</span>
                </div>
                <ProgressBar value={tasksDone} max={tasks.length} color={C.green} />
              </Card>
              <Card glow={C.yellow}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div>
                    <div style={{ fontSize: 10, color: C.textMuted, fontFamily: "'Syne',sans-serif", letterSpacing: "0.08em", textTransform: "uppercase" }}>Habits</div>

                    <div style={{ fontSize: 11, color: C.textMuted }}>Completed</div>

                  <span style={{ fontSize: 24 }}>⚡</span>
                </div>
                <ProgressBar value={habitsDone} max={habits.length} color={C.yellow} />
              </Card>
            </div>

            <Card style={{ marginBottom: 16, animation: "slideUp 0.75s ease" }}>
              <div className="section-title">7-Day Mood Trend</div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 6, height: 60, justifyContent: "space-between" }}>
                {moodLog.map((v, i) => (
                  <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, flex: 1 }}>
                    <div style={{ width: "100%", background: `linear-gradient(to top, ${v > 70 ? C.green : v > 50 ? C.blue : C.yellow}, ${v > 70 ? C.green + "60" : v > 50 ? C.blue + "60" : C.yellow + "60"})`, borderRadius: 4, height: `${(v / 100) * 50}px`, transition: "height 0.5s ease" }} />
                    <div style={{ fontSize: 9, color: C.textMuted }}>{"SMTWTFS"[i]}</div>
                  </div>
                ))}
              </div>
            </Card>

            <Card style={{ marginBottom: 16, background: "rgba(91,141,239,0.06)", borderColor: "rgba(91,141,239,0.2)", animation: "slideUp 0.8s ease" }}>
              <div style={{ display: "flex", gap: 12 }}>
                <div style={{ fontSize: 28 }}>🤖</div>
                <div>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 13, fontWeight: 700, color: C.blue, marginBottom: 4 }}>AI Insight</div>
                  <div style={{ fontSize: 13, color: "rgba(255,255,255,0.7)", lineHeight: 1.6 }}>Your best productivity days are <strong style={{ color: C.text }}>Tuesdays</strong>. Healthy eating days correlate with <strong style={{ color: C.green }}>34% higher</strong> task completion. 🎯</div>
                </div>
              </div>
            </Card>

            <Card style={{ animation: "slideUp 0.85s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div className="section-title" style={{ marginBottom: 0 }}>Today's Tasks</div>
                <button onClick={() => state.setActiveTab("productivity")} style={{ background: "none", border: "none", color: C.orange, fontSize: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, cursor: "pointer" }}>See All</button>
              </div>
              {state.tasks.slice(0, 3).map(task => (
                <div key={task.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
                  <div style={{ width: 20, height: 20, borderRadius: "50%", border: `2px solid ${task.done ? C.green : C.border}`, background: task.done ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, cursor: "pointer" }}
                    onClick={() => state.setTasks(state.tasks.map(t => t.id === task.id ? { ...t, done: !t.done } : t))}>
                    {task.done && <span style={{ color: "#fff", fontSize: 11 }}>✓</span>}
                  </div>

                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {MoodOpts.map(m => (
                      <button key={m} className="btn-press" onClick={() => setCheckin(c => ({ ...c, mood: m }))}
                        style={{ padding: "7px 12px", fontSize: 12, background: checkin.mood === m ? "rgba(255,140,66,0.15)" : C.surface, border: `1px solid ${checkin.mood === m ? "rgba(255,140,66,0.4)" : C.border}`, borderRadius: 100, color: checkin.mood === m ? C.orange : C.textMuted, cursor: "pointer" }}>

                  <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8 }}>Energy Level</div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {EnergyOpts.map(e => (

                        style={{ flex: 1, padding: "10px", fontSize: 12, background: checkin.energy === e ? "rgba(91,141,239,0.15)" : C.surface, border: `1px solid ${checkin.energy === e ? "rgba(91,141,239,0.4)" : C.border}`, borderRadius: 10, color: checkin.energy === e ? C.blue : C.textMuted, cursor: "pointer" }}>

                    {ScaleOpts.map(n => (

                        style={{ flex: 1, aspectRatio: "1", borderRadius: 6, background: checkin.stress === n ? "rgba(255,107,107,0.2)" : C.surface, border: `1px solid ${checkin.stress === n ? "rgba(255,107,107,0.4)" : C.border}`, color: checkin.stress === n ? C.red : C.textMuted, fontSize: 11, cursor: "pointer", fontFamily: "'Syne',sans-serif", fontWeight: 700 }}>

            {checkinDone && (
              <Card style={{ marginBottom: 16, background: "rgba(78,203,141,0.05)", borderColor: "rgba(78,203,141,0.2)" }}>
                <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                  <span style={{ fontSize: 24 }}>✅</span>
                  <div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 13, fontWeight: 700, color: C.green }}>Morning check-in done!</div>
                    <div style={{ fontSize: 12, color: C.textMuted }}>AI is personalising your day plan...</div>
                  </div>
                </div>
              </Card>
            )}

            <div ref={chatRef} style={{ height: "45vh", overflowY: "auto", display: "flex", flexDirection: "column", gap: 12, marginBottom: 16, paddingRight: 4 }}>
              {messages.map((m, i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", flexDirection: m.role === "user" ? "row-reverse" : "row", animation: "slideUp 0.3s ease" }}>

                  <div style={{ maxWidth: "80%", background: m.role === "ai" ? "rgba(91,141,239,0.1)" : "rgba(255,140,66,0.12)", border: `1px solid ${m.role === "ai" ? "rgba(91,141,239,0.2)" : "rgba(255,140,66,0.2)"}`, borderRadius: m.role === "ai" ? "4px 16px 16px 16px" : "16px 4px 16px 16px", padding: "12px 14px" }}>
                    <p style={{ fontSize: 13, color: "rgba(255,255,255,0.85)", lineHeight: 1.6 }}>{m.text}</p>

    // ─── HEALTH SCREEN ────────────────────────────────────────────────────────
    function HealthScreen({ state }) {
      const [tab, setTab] = useState("calories");
      const [newMeal, setNewMeal] = useState("");
      const [addingMeal, setAddingMeal] = useState(false);
      const [stressVal, setStressVal] = useState(() => state.todayStress ?? state.stressLog[state.stressLog.length-1] ?? 4);
      const [breathingActive, setBreathingActive] = useState(false);
      const [breathPhase, setBreathPhase] = useState("inhale");
      const [breathCount, setBreathCount] = useState(4);
      const breathRef = useRef();

      // FIX: clean up breathing interval on unmount
      useEffect(() => () => clearInterval(breathRef.current), []);

      const totalCals = state.meals.reduce((s, m) => s + m.calories, 0);

      const startBreathing = () => {
        setBreathingActive(true);
        const phases = [{ name: "inhale", dur: 4 }, { name: "hold", dur: 4 }, { name: "exhale", dur: 8 }, { name: "hold", dur: 4 }];
        let pi = 0, ci = phases[0].dur;
        breathRef.current = setInterval(() => {
          ci--;
          if (ci <= 0) { pi = (pi + 1) % phases.length; ci = phases[pi].dur; }
          setBreathPhase(phases[pi].name);
          setBreathCount(ci);
        }, 1000);
      };

      const stopBreathing = () => { clearInterval(breathRef.current); setBreathingActive(false); setBreathPhase("inhale"); setBreathCount(4); };

      const logMealAI = async () => {
        if (!newMeal.trim()) return;
        setAddingMeal(true);
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": ANTHROPIC_API_KEY,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-6",
              max_tokens: 1000,
              system: 'You are a nutrition AI. Respond ONLY with JSON: {"name":"...","calories":number,"macros":{"p":number,"c":number,"f":number},"quality":"healthy|mixed|junk"}. No other text.',
              messages: [{ role: "user", content: `Estimate nutrition for: ${newMeal}` }]
            })
          });
          const data = await res.json();
          const text = data.content?.[0]?.text || "{}";
          const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
          state.setMeals(prev => [...prev, { id: Date.now(), name: parsed.name || newMeal, calories: parsed.calories || 300, macros: parsed.macros || { p: 10, c: 40, f: 10 }, quality: parsed.quality || "mixed", time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) }]);
          setNewMeal("");
        } catch {
          state.setMeals(prev => [...prev, { id: Date.now(), name: newMeal, calories: 350, macros: { p: 12, c: 45, f: 12 }, quality: "mixed", time: "Now" }]);
          setNewMeal("");
        }
        setAddingMeal(false);
      };

      const qualityScore = () => {
        const qs = state.meals.map(m => m.quality === "healthy" ? 100 : m.quality === "mixed" ? 60 : 20);
        return qs.length ? Math.round(qs.reduce((a, b) => a + b, 0) / qs.length) : 50;
      };

      const tabs = [{ id: "calories", label: "Calories", emoji: "🍽️" }, { id: "stress", label: "Stress", emoji: "🧠" }, { id: "sleep", label: "Sleep", emoji: "😴" }, { id: "body", label: "Body", emoji: "💪" }];

      // Sleep tab computed values
      const sleepLast = state.sleepLogs[0];
      const sleepAvgH = state.sleepLogs.length ? Math.round(state.sleepLogs.reduce((s,l)=>s+l.duration,0)/state.sleepLogs.length*10)/10 : 0;
      const sleepLHrs = sleepLast ? Math.floor(sleepLast.duration) : 0;
      const sleepLMins = sleepLast ? Math.round((sleepLast.duration - sleepLHrs)*60) : 0;
      const sleep7Chart = (() => { const logs = state.sleepLogs.slice(0,7).reverse(); return [...Array(Math.max(0,7-logs.length)).fill(null), ...logs]; })();

      return (
        <Screen>
          <div style={{ padding: "56px 20px 20px" }}>
            <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text, marginBottom: 20 }}>Health 💚</h1>
            <div style={{ display: "flex", gap: 8, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
              {tabs.map(t => (
                <button key={t.id} className="btn-press" onClick={() => setTab(t.id)}
                  style={{ padding: "8px 16px", background: tab === t.id ? C.grad : C.surface, border: `1px solid ${tab === t.id ? "transparent" : C.border}`, borderRadius: 100, color: tab === t.id ? "#fff" : C.textMuted, fontSize: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            {tab === "calories" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Card style={{ display: "flex", alignItems: "center", gap: 20 }}>
                  <MoodFace score={qualityScore()} size={60} />
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>{totalCals} <span style={{ fontSize: 13, color: C.textMuted, fontWeight: 400 }}>/ {state.calorieGoal} kcal</span></div>
                    <ProgressBar value={totalCals} max={state.calorieGoal} color={totalCals > state.calorieGoal ? C.red : C.orange} height={8} />
                    <div style={{ fontSize: 12, color: C.textMuted, marginTop: 6 }}>
                      {totalCals < state.calorieGoal ? `${state.calorieGoal - totalCals} kcal remaining` : `${totalCals - state.calorieGoal} kcal over goal`}
                    </div>
                  </div>
                </Card>
                <Card>
                  <div className="section-title">Macros Today</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
                    {[
                      { label: "Protein", val: state.meals.reduce((s, m) => s + (m.macros?.p || 0), 0), color: C.blue, goal: 120 },
                      { label: "Carbs", val: state.meals.reduce((s, m) => s + (m.macros?.c || 0), 0), color: C.orange, goal: 250 },
                      { label: "Fats", val: state.meals.reduce((s, m) => s + (m.macros?.f || 0), 0), color: C.yellow, goal: 65 },
                    ].map(macro => (
                      <div key={macro.label} style={{ textAlign: "center" }}>
                        <Ring value={macro.val} max={macro.goal} size={70} color={macro.color} label={`${macro.val}g`} />
                        <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>{macro.label}</div>
                      </div>
                    ))}
                  </div>
                </Card>
                <Card>
                  <div className="section-title">Meal Log</div>
                  {state.meals.map(meal => (
                    <div key={meal.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: `1px solid ${C.border}` }}>
                      <div style={{ width: 40, height: 40, borderRadius: 10, background: meal.quality === "healthy" ? "rgba(78,203,141,0.12)" : meal.quality === "junk" ? "rgba(255,107,107,0.12)" : "rgba(255,209,102,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>
                        {meal.quality === "healthy" ? "🥗" : meal.quality === "junk" ? "🍔" : "🍱"}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: C.text, fontWeight: 500 }}>{meal.name}</div>
                        <div style={{ fontSize: 11, color: C.textMuted }}>{meal.time} · P:{meal.macros?.p}g C:{meal.macros?.c}g F:{meal.macros?.f}g</div>
                      </div>
                      <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 15, fontWeight: 700, color: C.orange }}>{meal.calories}</div>
                    </div>

                  <div style={{ display: "flex", gap: 8, marginTop: 14 }}>

                    <button className="btn-press" onClick={logMealAI} disabled={addingMeal} style={{ background: C.grad, border: "none", borderRadius: 10, padding: "11px 16px", color: "#fff", fontSize: 18, cursor: "pointer" }}>
                      {addingMeal ? "⏳" : "→"}
                    </button>
                  </div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginTop: 6 }}>AI calculates calories & macros automatically</div>

                      const scores = [80,60,40,90,70,50,85,30,75,65,80,55,90,70,45,85,60,80,70,55,90,40,75,85,60,70,80,90,55,75];
                      const s = scores[i] || 60;

                    <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 16 }}>
                      {stressVal > 7 ? "High stress — let's take a breath 🧘" : stressVal > 4 ? "Moderate — keep an eye on it 👀" : "Low stress — you're doing great! 😊"}
                    </div>

                      const v = +e.target.value;

                      state.setStressLog(prev => { const n = [...prev]; n[n.length-1] = v; return n; });
                    }} />
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: C.textMuted, marginTop: 4 }}><span>Calm</span><span>Stressed</span></div>

    // ─── PRODUCTIVITY SCREEN ──────────────────────────────────────────────────
    function ProductivityScreen({ state }) {
      const [tab, setTab] = useState("tasks");
      const [newTask, setNewTask] = useState("");
      const [newHabit, setNewHabit] = useState("");
      const [focusSecs, setFocusSecs] = useState(25 * 60);
      const [focusRunning, setFocusRunning] = useState(false);
      const timerRef = useRef();

      useEffect(() => () => clearInterval(timerRef.current), []);

      const toggleTask = (id) => state.setTasks(state.tasks.map(t => t.id === id ? { ...t, done: !t.done } : t));
      const addTask = () => {
        if (!newTask.trim()) return;
        state.setTasks(prev => [...prev, { id: Date.now(), text: newTask, done: false, priority: "medium", time: "30 min" }]);
        setNewTask("");
      };
      const addHabit = () => {
        if (!newHabit.trim()) return;
        state.setHabits(prev => [...prev, { id: Date.now(), name: newHabit, done: false, emoji: "⭐" }]);
        setNewHabit("");
      };
      const toggleFocus = () => {
        if (focusRunning) { clearInterval(timerRef.current); setFocusRunning(false); }
        else {
          setFocusRunning(true);
          timerRef.current = setInterval(() => {
            setFocusSecs(s => { if (s <= 1) { clearInterval(timerRef.current); setFocusRunning(false); return 25 * 60; } return s - 1; });
          }, 1000);
        }
      };

      const mins = Math.floor(focusSecs / 60).toString().padStart(2, "0");
      const secs = (focusSecs % 60).toString().padStart(2, "0");
      const progress = ((25 * 60 - focusSecs) / (25 * 60)) * 100;
      const priorityColor = { high: C.red, medium: C.yellow, low: C.green };
      const tabs = [{ id: "tasks", label: "Tasks", emoji: "✅" }, { id: "habits", label: "Habits", emoji: "⚡" }, { id: "focus", label: "Focus", emoji: "🎯" }, { id: "weekly", label: "Weekly", emoji: "📅" }];

      return (
        <Screen>
          <div style={{ padding: "56px 20px 20px" }}>
            <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text, marginBottom: 20 }}>Productivity ⚡</h1>
            <div style={{ display: "flex", gap: 8, marginBottom: 20, overflowX: "auto", paddingBottom: 4 }}>
              {tabs.map(t => (
                <button key={t.id} className="btn-press" onClick={() => setTab(t.id)}
                  style={{ padding: "8px 16px", background: tab === t.id ? C.grad : C.surface, border: `1px solid ${tab === t.id ? "transparent" : C.border}`, borderRadius: 100, color: tab === t.id ? "#fff" : C.textMuted, fontSize: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            {tab === "tasks" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
                  {[
                    { label: "Done", value: state.tasksDone, color: C.green },
                    { label: "Left", value: state.tasks.length - state.tasksDone, color: C.orange },
                    { label: "Rate", value: state.tasks.length ? `${Math.round((state.tasksDone / state.tasks.length) * 100)}%` : "N/A", color: C.blue },
                  ].map(s => (
                    <Card key={s.label} style={{ textAlign: "center", padding: 12 }}>
                      <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: s.color }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: C.textMuted }}>{s.label}</div>
                    </Card>
                  ))}
                </div>
                <Card>
                  <div className="section-title">Priority Matrix</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {[
                      { label: "🔴 Do Now", tasks: state.tasks.filter(t => t.priority === "high" && !t.done) },
                      { label: "🟡 Schedule", tasks: state.tasks.filter(t => t.priority === "medium" && !t.done) },
                      { label: "🟢 Delegate", tasks: [] },
                      { label: "⚪ Drop", tasks: state.tasks.filter(t => t.priority === "low" && !t.done) },
                    ].map(q => (
                      <div key={q.label} style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${C.border}`, borderRadius: 10, padding: 10, minHeight: 80 }}>
                        <div style={{ fontSize: 11, fontFamily: "'Syne',sans-serif", fontWeight: 700, color: C.textMuted, marginBottom: 8 }}>{q.label}</div>
                        {q.tasks.map(t => <div key={t.id} style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: 4, lineHeight: 1.4 }}>· {t.text}</div>)}
                      </div>
                    ))}
                  </div>
                </Card>
                <Card>
                  <div className="section-title">All Tasks</div>
                  {state.tasks.map(task => (
                    <div key={task.id} className="card-hover" style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: `1px solid ${C.border}`, cursor: "pointer" }} onClick={() => toggleTask(task.id)}>
                      <div style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${task.done ? C.green : C.border}`, background: task.done ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s" }}>
                        {task.done && <span style={{ color: "#fff", fontSize: 11 }}>✓</span>}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: task.done ? C.textMuted : C.text, textDecoration: task.done ? "line-through" : "none" }}>{task.text}</div>

                      </div>
                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: priorityColor[task.priority] }} />

                  <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                    <input value={newTask} onChange={e => setNewTask(e.target.value)} onKeyDown={e => e.key === "Enter" && addTask()} placeholder="Add a task..."

                    <button className="btn-press" onClick={addTask} style={{ background: C.grad, border: "none", borderRadius: 10, padding: "11px 16px", color: "#fff", fontSize: 18, cursor: "pointer" }}>+</button>
                  </div>
                </Card>
              </div>
            )}

            {tab === "habits" && (

                    <button className="btn-press" onClick={addHabit} style={{ background: C.grad, border: "none", borderRadius: 10, padding: "11px 16px", color: "#fff", fontSize: 18, cursor: "pointer" }}>+</button>
                  </div>
                </Card>
                <Card>
                  <div className="section-title">30-Day Habit Grid</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 4 }}>

                      const intensity = [1,1,0.8,0.4,1,0.6,0.8,1,0.9,0.5,1,0.7,0.8,1,0.6,0.9,1,0.8,0.7,1,0.5,0.9,1,0.8,0.9,1,0.7,1,0.8,0.9][i];
                      return <div key={i} style={{ aspectRatio: "1", borderRadius: 4, background: `rgba(255,209,102,${i < 12 ? intensity : 0.15})` }} />;
                    })}
                  </div>
                </Card>
              </div>
            )}

            {tab === "focus" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Card style={{ textAlign: "center", padding: "32px 24px" }}>
                  <div style={{ position: "relative", width: 180, height: 180, margin: "0 auto 24px" }}>
                    <svg width="180" height="180" style={{ position: "absolute", transform: "rotate(-90deg)" }}>
                      <circle cx="90" cy="90" r="82" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="10" />
                      <circle cx="90" cy="90" r="82" fill="none" stroke={focusRunning ? C.orange : "rgba(255,140,66,0.3)"} strokeWidth="10" strokeDasharray={2 * Math.PI * 82} strokeDashoffset={2 * Math.PI * 82 * (1 - progress / 100)} strokeLinecap="round" style={{ transition: "stroke-dashoffset 1s linear" }} />
                    </svg>
                    <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                      <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 44, fontWeight: 800, color: C.text }}>{mins}:{secs}</div>
                      <div style={{ fontSize: 12, color: C.textMuted }}>{focusRunning ? "Focus session" : "Ready"}</div>

                  </div>
                  <GradBtn onClick={toggleFocus} style={{ maxWidth: 200, margin: "0 auto" }}>{focusRunning ? "⏸ Pause" : "▶ Start Focus"}</GradBtn>
                  <button className="btn-press" onClick={() => { clearInterval(timerRef.current); setFocusRunning(false); setFocusSecs(25 * 60); }}
                    style={{ background: "none", border: "none", color: C.textMuted, cursor: "pointer", marginTop: 12, fontSize: 13 }}>Reset</button>
                </Card>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>

              const recapMsg = state.streak > 14 ? `🔥 Incredible — ${state.streak}-day streak! You're unstoppable.` : state.streak > 7 ? `🌟 Amazing — ${state.streak}-day streak! Keep building.` : state.streak > 3 ? `💪 Great — ${state.streak}-day streak going strong!` : state.streak > 0 ? `You're on a ${state.streak}-day streak. Every day counts! 🌱` : "Start your journey — one habit at a time. 🌱";
              return (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                <Card style={{ background: "rgba(78,203,141,0.05)", borderColor: "rgba(78,203,141,0.2)" }}>
                  <div className="section-title">This Week's Recap</div>
