    // ─── ACHIEVEMENTS SCREEN ──────────────────────────────────────────────────
    function AchievementsScreen({ state }) {
      const [celebrating, setCelebrating] = useState(null);
      const [showSecret, setShowSecret] = useState(false);

      const celebrate = (ach) => {
        if (!ach.unlocked) return;
        setCelebrating(ach.id);
        setTimeout(() => setCelebrating(null), 2000);
      };

      const unlocked = state.achievements.filter(a => a.unlocked);
      const locked = state.achievements.filter(a => !a.unlocked && !a.secret);
      const secret = state.achievements.filter(a => !a.unlocked && a.secret);

      return (
        <Screen>
          <div style={{ padding: "56px 20px 20px" }}>
            {celebrating && (
              <div style={{ position: "fixed", inset: 0, pointerEvents: "none", zIndex: 100, overflow: "hidden" }}>
                {["🎉", "⭐", "🌟", "✨", "🎊"].map((e, i) => (
                  <div key={i} style={{ position: "absolute", left: `${20 + i * 15}%`, top: "-20px", fontSize: 24, animation: `confettiFall ${0.8 + i * 0.2}s ease-in forwards`, animationDelay: `${i * 0.1}s` }}>{e}</div>
                ))}
              </div>
            )}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <h1 style={{ fontFamily: "'Syne',sans-serif", fontSize: 22, fontWeight: 800, color: C.text }}>Achievements 🏆</h1>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 20, fontWeight: 800, color: C.orange }}>{unlocked.length}/{state.achievements.length}</div>
                <div style={{ fontSize: 11, color: C.textMuted }}>Unlocked</div>
              </div>
            </div>
            <Card style={{ marginBottom: 16, background: "linear-gradient(135deg, rgba(255,140,66,0.1), rgba(255,107,107,0.07))", borderColor: "rgba(255,140,66,0.25)", display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ fontSize: 48, animation: "streakGlow 2s ease-in-out infinite" }}>🔥</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 28, fontWeight: 800, color: C.text }}>{state.streak} Days</div>
                <div style={{ fontSize: 13, color: C.textMuted }}>Current streak · 1 grace day available</div>
                <ProgressBar value={state.streak} max={30} color={C.orange} height={4} />
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 4 }}>Next milestone: 30 days</div>
              </div>
            </Card>
            <div className="section-title">Unlocked ({unlocked.length})</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              {unlocked.map(ach => (
                <div key={ach.id} className="card-hover" onClick={() => celebrate(ach)} style={{ background: celebrating === ach.id ? "rgba(255,140,66,0.15)" : "rgba(255,255,255,0.04)", border: `1px solid ${celebrating === ach.id ? "rgba(255,140,66,0.5)" : C.border}`, borderRadius: 16, padding: 16, cursor: "pointer", transition: "all 0.2s", position: "relative", overflow: "hidden" }}>
                  {celebrating === ach.id && <div className="achievement-shine" style={{ position: "absolute", inset: 0, borderRadius: 16 }} />}
                  <div style={{ fontSize: 32, marginBottom: 8 }}>{ach.emoji}</div>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 4 }}>{ach.name}</div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8, lineHeight: 1.4 }}>{ach.desc}</div>
                  <div style={{ fontSize: 10, color: C.orange, fontStyle: "italic", lineHeight: 1.4 }}>"{ach.note}"</div>
                </div>
              ))}
            </div>
            <div className="section-title">In Progress ({locked.length})</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              {locked.map(ach => (
                <div key={ach.id} style={{ background: "rgba(255,255,255,0.02)", border: `1px solid ${C.border}`, borderRadius: 16, padding: 16, opacity: 0.6 }}>
                  <div style={{ fontSize: 32, marginBottom: 8, filter: "grayscale(1)" }}>{ach.emoji}</div>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 13, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>{ach.name}</div>
                  <div style={{ fontSize: 11, color: C.textDim, lineHeight: 1.4 }}>{ach.desc}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div className="section-title" style={{ marginBottom: 0 }}>Secret Achievements 🔒</div>
              <button onClick={() => setShowSecret(v => !v)} style={{ background: "none", border: "none", color: C.orange, fontSize: 12, fontFamily: "'Syne',sans-serif", fontWeight: 700, cursor: "pointer" }}>{showSecret ? "Hide" : "Reveal"}</button>
            </div>
            {showSecret ? (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                {secret.map(ach => (
                  <div key={ach.id} style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,140,66,0.1)", borderRadius: 16, padding: 16 }}>
                    <div style={{ fontSize: 24, marginBottom: 8 }}>❓</div>
                    <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 12, fontWeight: 700, color: C.textMuted }}>Hidden Achievement</div>
                    <div style={{ fontSize: 11, color: C.textDim, marginTop: 4 }}>Keep using the app to discover this!</div>
                  </div>
                ))}
              </div>
            ) : (
              <Card style={{ textAlign: "center", padding: 20 }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>🎁</div>
                <div style={{ fontSize: 14, color: C.textMuted }}>There are {secret.length} secret achievements waiting. Keep going!</div>
              </Card>
            )}
          </div>
        </Screen>
      );
    }

    // ─── JOURNAL SCREEN ──────────────────────────────────────────────────────
    function JournalScreen({ state }) {
      const [tab, setTab] = useState("write");
      const [journalText, setJournalText] = useState("");
      const [gratitude, setGratitude] = useState(["", "", ""]);
      const [selectedMood, setSelectedMood] = useState(null);
      const [aiInsight, setAiInsight] = useState(null);
      const [loadingInsight, setLoadingInsight] = useState(false);
      const [saved, setSaved] = useState(false);

      const MOODS = [
        { emoji: "😄", label: "Great",   score: 90, color: C.green  },
        { emoji: "🙂", label: "Good",    score: 70, color: C.blue   },
        { emoji: "😐", label: "Okay",    score: 50, color: C.yellow },
        { emoji: "😔", label: "Low",     score: 30, color: C.orange },
        { emoji: "😰", label: "Anxious", score: 15, color: C.red    },
      ];

      const saveEntry = () => {
        if (!journalText.trim() && gratitude.every(g => !g.trim())) return;
        const mood = selectedMood ? selectedMood.score : 60;
        const now = new Date();
        state.setJournalEntries(prev => [
          { id: Date.now(), date: now.toLocaleDateString([], {month:"short",day:"numeric"}), dateKey: now.toDateString(), mood, text: journalText, gratitude: gratitude.filter(g => g.trim()) },
          ...prev,
        ]);
        setSaved(true);
        setTimeout(() => setSaved(false), 2200);
        setJournalText(""); setGratitude(["", "", ""]); setSelectedMood(null);
      };

      const getAiInsight = async () => {
        setLoadingInsight(true); setAiInsight(null);
        const entries = state.journalEntries.slice(0, 5);
        const summary = entries.map(e =>
          `Date: ${e.date}, Mood: ${e.mood}/100, Entry: "${e.text}", Gratitude: ${(e.gratitude||[]).join(", ")}`
        ).join("\n");
        const fallbacks = [
          "📊 Your mood has been trending upward — consistent journaling is linked to better emotional regulation. Keep it up!",
          "✨ You mention gratitude for people often. Strong social connections are your #1 wellbeing driver — nurture them.",
          "🌅 Your entries are most positive in the mornings. Journaling earlier in the day could help set a positive tone.",
          "💡 Patterns suggest your mood dips mid-week. A Wednesday wind-down ritual could smooth out that dip.",
        ];
        if (!ANTHROPIC_API_KEY) {
          setTimeout(() => { setAiInsight(fallbacks[Math.floor(Math.random()*fallbacks.length)]); setLoadingInsight(false); }, 1400);
          return;
        }
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type":"application/json","x-api-key":ANTHROPIC_API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
            body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:200, messages:[{ role:"user", content:`Analyze these journal entries and give ONE concise warm actionable insight (2-3 sentences) about mood patterns or wellbeing. Start with an emoji.\n\n${summary}` }] })
          });
          const data = await res.json();
          setAiInsight(data.content?.[0]?.text || fallbacks[0]);
        } catch { setAiInsight(fallbacks[0]); }
        setLoadingInsight(false);
      };

      const tabs = [{ id:"write",label:"Write",emoji:"✏️"},{ id:"entries",label:"Entries",emoji:"📖"},{ id:"insights",label:"Insights",emoji:"🧠"}];

      return (
        <Screen>
          <div style={{ padding:"56px 20px 20px" }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.text,marginBottom:20 }}>Journal 📓</h1>
            <div style={{ display:"flex",gap:8,marginBottom:20,overflowX:"auto",paddingBottom:4 }}>
              {tabs.map(t => (
                <button key={t.id} className="btn-press" onClick={() => setTab(t.id)}
                  style={{ padding:"8px 16px",background:tab===t.id?C.grad:C.surface,border:`1px solid ${tab===t.id?"transparent":C.border}`,borderRadius:100,color:tab===t.id?"#fff":C.textMuted,fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap" }}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            {tab === "write" && (
              <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
                <Card glow={C.yellow}>
                  <div className="section-title">How are you feeling?</div>
                  <div style={{ display:"flex",justifyContent:"space-around" }}>
                    {MOODS.map(m => (
                      <button key={m.emoji} className="btn-press" onClick={() => setSelectedMood(selectedMood?.emoji===m.emoji?null:m)}
                        style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:5,background:"none",border:"none",cursor:"pointer",padding:0 }}>
                        <div style={{ width:48,height:48,borderRadius:"50%",background:selectedMood?.emoji===m.emoji?`${m.color}25`:C.surface,border:`2px solid ${selectedMood?.emoji===m.emoji?m.color:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,transition:"all 0.2s" }}>{m.emoji}</div>
                        <span style={{ fontSize:9,color:selectedMood?.emoji===m.emoji?m.color:C.textMuted,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{m.label}</span>
                      </button>
                    ))}
                  </div>
                </Card>
                <Card>
                  <div className="section-title">Today's Reflection</div>
                  <textarea value={journalText} onChange={e => setJournalText(e.target.value)} placeholder="What's on your mind? How did today go? What are you proud of?..." rows={5}
                    style={{ width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px",color:C.text,fontSize:14,outline:"none",resize:"none",lineHeight:1.7,fontFamily:"'DM Sans',sans-serif" }} />
                  {journalText && <div style={{ fontSize:11,color:C.textMuted,marginTop:6,textAlign:"right" }}>{journalText.split(/\s+/).filter(Boolean).length} words</div>}
                </Card>
                <Card>
                  <div className="section-title">3 Things I'm Grateful For ✨</div>
                  {gratitude.map((g, i) => (
                    <input key={i} value={g} onChange={e => { const n=[...gratitude]; n[i]=e.target.value; setGratitude(n); }}
                      placeholder={["Something that made me smile...","Someone I appreciate...","A small win today..."][i]}
                      style={{ width:"100%",background:"rgba(255,255,255,0.03)",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:13,outline:"none",marginBottom:i<2?8:0 }} />
                  ))}
                </Card>
                {saved
                  ? <div style={{ background:"rgba(78,203,141,0.1)",border:`1px solid rgba(78,203,141,0.3)`,borderRadius:14,padding:15,textAlign:"center",color:C.green,fontFamily:"'Syne',sans-serif",fontWeight:700,animation:"fadeIn 0.3s ease" }}>✅ Entry saved!</div>
                  : <GradBtn onClick={saveEntry} disabled={!journalText.trim()&&gratitude.every(g=>!g.trim())}>Save Entry</GradBtn>
                }
              </div>
            )}

            {tab === "entries" && (
              <div style={{ display:"flex",flexDirection:"column",gap:12 }}>
                {state.journalEntries.length === 0 && (
                  <Card style={{ textAlign:"center",padding:24 }}>
                    <div style={{ fontSize:32,marginBottom:8 }}>📓</div>
                    <div style={{ color:C.textMuted,fontSize:14 }}>No entries yet. Start writing!</div>
                  </Card>
                )}
                {state.journalEntries.map(entry => (
                  <Card key={entry.id}>
                    <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10 }}>
                      <div style={{ fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:700,color:C.textMuted }}>{entry.date}</div>
                      <MoodFace score={entry.mood} size={32} />
                    </div>
                    {entry.text && <div style={{ fontSize:13,color:"rgba(255,255,255,0.75)",lineHeight:1.7,marginBottom:entry.gratitude?.length?12:0 }}>{entry.text}</div>}
                    {entry.gratitude?.length > 0 && (
                      <div style={{ borderTop:`1px solid ${C.border}`,paddingTop:10 }}>
                        <div style={{ fontSize:10,color:C.textMuted,fontFamily:"'Syne',sans-serif",fontWeight:700,marginBottom:6 }}>GRATEFUL FOR</div>
                        {entry.gratitude.map((g,i) => <div key={i} style={{ fontSize:12,color:C.yellow,marginBottom:3 }}>✨ {g}</div>)}
                      </div>
                    )}
                  </Card>
                ))}
              </div>
            )}

            {tab === "insights" && (
              <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
                <Card style={{ background:"rgba(255,209,102,0.05)",borderColor:"rgba(255,209,102,0.2)" }}>
                  <div className="section-title">7-Day Mood Trend</div>
                  <div style={{ display:"flex",alignItems:"flex-end",gap:6,height:80 }}>
                    {state.moodLog.map((v,i) => (
                      <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                        <div style={{ width:"100%",background:v>=70?C.green:v>=50?C.yellow:C.red,borderRadius:"4px 4px 0 0",height:`${(v/100)*64}px`,opacity:0.85,transition:"height 0.5s ease" }} />
                        <div style={{ fontSize:9,color:C.textMuted }}>{"SMTWTFS"[i]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex",justifyContent:"space-between",marginTop:12 }}>
                    <div style={{ fontSize:12,color:C.textMuted }}>Avg mood: <span style={{ color:C.yellow,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{Math.round(state.moodLog.reduce((a,b)=>a+b,0)/state.moodLog.length)}/100</span></div>
                    <div style={{ fontSize:12,color:C.textMuted }}>{state.journalEntries.length} entries logged</div>
                  </div>
                </Card>
                <Card>
                  <div className="section-title">Gratitude Streak</div>
                  {(() => {
                    const days14 = Array.from({length:14},(_,i) => new Date(Date.now()-i*86400000).toDateString()).reverse();
                    const hasGrat = days14.map(d => state.journalEntries.some(e => e.dateKey===d && e.gratitude?.length>0));
                    let streak14=0; for(let i=hasGrat.length-1;i>=0&&hasGrat[i];i--)streak14++;
                    return (<>
                      <div style={{ display:"flex",gap:4,flexWrap:"wrap" }}>
                        {days14.map((d,i) => (
                          <div key={i} style={{ width:28,height:28,borderRadius:6,background:hasGrat[i]?"rgba(255,209,102,0.35)":"rgba(255,255,255,0.05)",border:`1px solid ${hasGrat[i]?"rgba(255,209,102,0.3)":C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13 }}>
                            {hasGrat[i]?"✨":""}
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize:12,color:C.textMuted,marginTop:10 }}>
                        {streak14>0 ? `${streak14}-day gratitude streak 🔥` : "Write your first gratitude entry!"}
                      </div>
                    </>);
                  })()}
                </Card>
                <Card style={{ background:"rgba(91,141,239,0.05)",borderColor:"rgba(91,141,239,0.2)" }}>
                  <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
                    <div className="section-title" style={{ margin:0 }}>AI Pattern Insights</div>
                    <Tag color={C.blue}>Claude</Tag>
                  </div>
                  {aiInsight
                    ? <div style={{ fontSize:13,color:"rgba(255,255,255,0.85)",lineHeight:1.7,animation:"fadeIn 0.5s ease" }}>{aiInsight}</div>
                    : <div style={{ fontSize:13,color:C.textMuted,lineHeight:1.6,marginBottom:16 }}>Claude reads your recent entries and surfaces patterns in your mood, gratitude themes, and wellbeing.</div>
                  }
                  <GradBtn grad={C.gradBlue} onClick={getAiInsight} disabled={loadingInsight} style={{ marginTop:aiInsight?14:0 }}>
                    {loadingInsight?"Analyzing entries...":aiInsight?"Refresh Insight ↻":"✨ Generate Insight"}
                  </GradBtn>
                </Card>
                <Card>
                  <div className="section-title">Writing Consistency This Week</div>
                  {(() => {
                    const DAY_LABELS = "SMTWTFS";
                    const days7 = Array.from({length:7},(_,i) => { const d=new Date(Date.now()-(6-i)*86400000); return { key:d.toDateString(), label:DAY_LABELS[d.getDay()] }; });
                    const written = days7.map(d => state.journalEntries.some(e => e.dateKey===d.key));
                    const cnt = written.filter(Boolean).length;
                    return (<>
                      <div style={{ display:"flex",gap:4 }}>
                        {days7.map((d,i) => (
                          <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                            <div style={{ width:"100%",aspectRatio:"1",borderRadius:6,background:written[i]?"rgba(255,209,102,0.35)":"rgba(255,255,255,0.05)",border:`1px solid ${written[i]?"rgba(255,209,102,0.3)":C.border}` }} />
                            <div style={{ fontSize:9,color:C.textMuted }}>{d.label}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontSize:12,color:C.textMuted,marginTop:10 }}>
                        {cnt>0 ? `${cnt}/7 days this week · ${cnt>=6?"Keep it up! 🔥":cnt>=4?"Good progress! 💪":"Keep going!"}` : "Write your first journal entry today!"}
                      </div>
                    </>);
                  })()}
                </Card>
              </div>
            )}
          </div>
        </Screen>
      );
    }

    // ─── WORKOUT SCREEN ───────────────────────────────────────────────────────
    function WorkoutScreen({ state }) {
      const [tab, setTab] = useState("log");
      const [selectedType, setSelectedType] = useState(null);
      const [duration, setDuration] = useState(30);
      const [intensity, setIntensity] = useState("Medium");
      const [logged, setLogged] = useState(false);

      const WORKOUT_TYPES = [
        { type:"Run",   emoji:"🏃", calPerMin:10 },
        { type:"Lift",  emoji:"🏋️", calPerMin:8  },
        { type:"Yoga",  emoji:"🧘", calPerMin:4  },
        { type:"HIIT",  emoji:"⚡", calPerMin:12 },
        { type:"Swim",  emoji:"🏊", calPerMin:9  },
        { type:"Cycle", emoji:"🚴", calPerMin:8  },
        { type:"Walk",  emoji:"🚶", calPerMin:5  },
        { type:"Other", emoji:"💪", calPerMin:7  },
      ];
      const intensityMult = { Easy:0.75, Medium:1, Hard:1.35 };
      const calsBurned = selectedType ? Math.round(selectedType.calPerMin * duration * intensityMult[intensity]) : 0;

      const logWorkout = () => {
        if (!selectedType) return;
        state.setWorkouts(prev => [{ id:Date.now(), type:selectedType.type, emoji:selectedType.emoji, duration, intensity, calories:calsBurned, date:"Today", time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}) }, ...prev]);
        setLogged(true);
        setTimeout(() => { setLogged(false); setSelectedType(null); setDuration(30); setIntensity("Medium"); }, 2000);
      };

      const weekWorkouts = state.workouts.filter(w => {
        const age = (Date.now() - w.id) / 86400000;
        return age < 7;
      });
      const totalMinsWeek  = weekWorkouts.reduce((s,w) => s+w.duration, 0);
      const totalCalsWeek  = weekWorkouts.reduce((s,w) => s+w.calories, 0);

      // Real weekly chart — last 7 days
      const weekChart = (() => {
        const dayLetters = ["S","M","T","W","T","F","S"];
        return Array.from({length:7}, (_,i) => {
          const d = new Date(); d.setDate(d.getDate() - (6 - i));
          const key = d.toDateString();
          const mins = state.workouts.filter(w => new Date(w.id).toDateString() === key).reduce((s,w) => s+w.duration, 0);
          return { day: dayLetters[d.getDay()], mins };
        });
      })();

      // Computed best workout streak (consecutive days with a workout, using id timestamps)
      const bestStreak = (() => {
        const days = [...new Set(state.workouts.map(w => new Date(w.id).toDateString()))].sort((a,b) => new Date(b)-new Date(a));
        if (!days.length) return 0;
        let best = 1, cur = 1;
        for (let i = 1; i < days.length; i++) {
          const diff = (new Date(days[i-1]) - new Date(days[i])) / 86400000;
          cur = diff === 1 ? cur + 1 : 1;
          if (cur > best) best = cur;
        }
        return best;
      })();

      const tabs = [{ id:"log",label:"Log",emoji:"➕"},{ id:"history",label:"History",emoji:"📋"},{ id:"stats",label:"Stats",emoji:"📊"}];

      const noDevice = !state.user?.device || state.user.device === "No, I don't have one";
      if (noDevice) return (
        <Screen>
          <div style={{ padding:"56px 20px 20px" }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.text,marginBottom:20 }}>Workouts 🏋️</h1>
            <Card style={{ textAlign:"center",padding:"36px 24px",marginBottom:16 }}>
              <div style={{ fontSize:56,marginBottom:16 }}>🔒</div>
              <div style={{ fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:C.text,marginBottom:8 }}>Workout Tracking Locked</div>
              <div style={{ fontSize:13,color:C.textMuted,lineHeight:1.6,marginBottom:24 }}>Accurate workout data — heart rate zones, calories burned, and recovery metrics — sync from your wearable. Connect a device to unlock full tracking.</div>
              <div style={{ fontSize:12,color:C.textMuted,marginBottom:14 }}>Supported devices:</div>
              <div style={{ display:"flex",justifyContent:"center",gap:10,flexWrap:"wrap",marginBottom:24 }}>
                {["⌚ Apple Watch","💪 Whoop","⌚ Fitbit","⌚ Garmin"].map(d => (
                  <span key={d} style={{ fontSize:12,background:C.surface,border:`1px solid ${C.border}`,borderRadius:20,padding:"6px 14px",color:C.textMuted }}>{d}</span>
                ))}
              </div>
              <button className="btn-press" onClick={() => state.setScreen("progress")}
                style={{ width:"100%",padding:"14px",background:C.grad,border:"none",borderRadius:14,color:"#fff",fontFamily:"'Syne',sans-serif",fontSize:14,fontWeight:700,cursor:"pointer" }}>
                Set Up Device in Profile →
              </button>
            </Card>
            <Card style={{ background:"rgba(255,140,66,0.04)",borderColor:"rgba(255,140,66,0.2)" }}>
              <div style={{ fontSize:12,color:C.textMuted,marginBottom:4 }}>No device?</div>
              <div style={{ fontSize:13,color:C.text,lineHeight:1.5 }}>A native Orbit app with real Apple Watch, Whoop & Garmin sync is coming soon. For now, connect a wearable to track workouts accurately.</div>
            </Card>
          </div>
        </Screen>
      );

      return (
        <Screen>
          <div style={{ padding:"56px 20px 20px" }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.text,marginBottom:20 }}>Workouts 🏋️</h1>
            <div style={{ display:"flex",gap:8,marginBottom:20 }}>
              {tabs.map(t => (
                <button key={t.id} className="btn-press" onClick={() => setTab(t.id)}
                  style={{ flex:1,padding:"10px",background:tab===t.id?C.grad:C.surface,border:`1px solid ${tab===t.id?"transparent":C.border}`,borderRadius:12,color:tab===t.id?"#fff":C.textMuted,fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,cursor:"pointer" }}>
                  {t.emoji} {t.label}
                </button>
              ))}
            </div>

            {tab === "log" && (
              <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
                {logged ? (
                  <Card style={{ textAlign:"center",padding:"32px 20px",background:"rgba(78,203,141,0.05)",borderColor:"rgba(78,203,141,0.3)",animation:"fadeIn 0.3s ease" }}>
                    <div style={{ fontSize:52,marginBottom:8 }}>🎉</div>
                    <div style={{ fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:C.green }}>Workout logged!</div>
                    <div style={{ fontSize:13,color:C.textMuted,marginTop:4 }}>{calsBurned} kcal burned · {duration} minutes</div>
                  </Card>
                ) : (
                  <>
                    <Card>
                      <div className="section-title">Choose Workout Type</div>
                      <div style={{ display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10 }}>
                        {WORKOUT_TYPES.map(wt => (
                          <button key={wt.type} className="btn-press" onClick={() => setSelectedType(selectedType?.type===wt.type?null:wt)}
                            style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 4px",background:selectedType?.type===wt.type?"rgba(255,140,66,0.12)":C.surface,border:`1.5px solid ${selectedType?.type===wt.type?C.orange:C.border}`,borderRadius:14,cursor:"pointer",transition:"all 0.2s" }}>
                            <span style={{ fontSize:24 }}>{wt.emoji}</span>
                            <span style={{ fontSize:10,color:selectedType?.type===wt.type?C.orange:C.textMuted,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{wt.type}</span>
                          </button>
                        ))}
                      </div>
                    </Card>
                    <Card>
                      <div className="section-title">Duration</div>
                      <div style={{ textAlign:"center",fontFamily:"'Syne',sans-serif",fontSize:44,fontWeight:800,color:C.orange,marginBottom:12 }}>{duration}<span style={{ fontSize:18,color:C.textMuted }}> min</span></div>
                      <input type="range" min={5} max={120} step={5} value={duration} onChange={e => setDuration(+e.target.value)} />
                      <div style={{ display:"flex",justifyContent:"space-between",fontSize:11,color:C.textMuted,marginTop:4 }}><span>5 min</span><span>2 hrs</span></div>
                    </Card>
                    <Card>
                      <div className="section-title">Intensity</div>
                      <div style={{ display:"flex",gap:10 }}>
                        {[["Easy","😌",C.green],["Medium","💪",C.yellow],["Hard","🔥",C.red]].map(([lvl,em,col]) => (
                          <button key={lvl} className="btn-press" onClick={() => setIntensity(lvl)}
                            style={{ flex:1,padding:"14px 8px",background:intensity===lvl?`${col}15`:C.surface,border:`1.5px solid ${intensity===lvl?col:C.border}`,borderRadius:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                            <span style={{ fontSize:20 }}>{em}</span>
                            <span style={{ fontSize:12,color:intensity===lvl?col:C.textMuted,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{lvl}</span>
                          </button>
                        ))}
                      </div>
                    </Card>
                    {selectedType && (
                      <Card style={{ background:"rgba(255,140,66,0.05)",borderColor:"rgba(255,140,66,0.2)",animation:"fadeIn 0.3s ease" }}>
                        <div style={{ display:"flex",justifyContent:"space-around",textAlign:"center" }}>
                          {[{ l:"Duration",v:`${duration}m`,c:C.orange },{ l:"Est. Calories",v:`${calsBurned} kcal`,c:C.red },{ l:"Intensity",v:intensity,c:intensity==="Hard"?C.red:intensity==="Medium"?C.yellow:C.green }].map(s => (
                            <div key={s.l}>
                              <div style={{ fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,color:s.c }}>{s.v}</div>
                              <div style={{ fontSize:11,color:C.textMuted }}>{s.l}</div>
                            </div>
                          ))}
                        </div>
                      </Card>
                    )}
                    <GradBtn onClick={logWorkout} disabled={!selectedType}>
                      {selectedType ? `Log ${selectedType.emoji} ${selectedType.type}` : "Select a workout type first"}
                    </GradBtn>
                  </>
                )}
              </div>
            )}

            {tab === "history" && (
              <div style={{ display:"flex",flexDirection:"column",gap:10 }}>
                {state.workouts.length===0 && (
                  <Card style={{ textAlign:"center",padding:24 }}>
                    <div style={{ fontSize:32,marginBottom:8 }}>🏃</div>
                    <div style={{ color:C.textMuted,fontSize:14 }}>No workouts yet. Log your first!</div>
                  </Card>
                )}
                {state.workouts.map(w => (
                  <Card key={w.id}>
                    <div style={{ display:"flex",alignItems:"center",gap:14 }}>
                      <div style={{ width:48,height:48,borderRadius:14,background:"rgba(255,140,66,0.1)",border:"1px solid rgba(255,140,66,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0 }}>{w.emoji}</div>
                      <div style={{ flex:1 }}>
                        <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                          <div style={{ fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:700,color:C.text }}>{w.type}</div>
                          <div style={{ fontSize:11,color:C.textMuted }}>{w.date} · {w.time}</div>
                        </div>
                        <div style={{ display:"flex",gap:8,marginTop:5,flexWrap:"wrap" }}>
                          <Tag color={C.orange}>{w.duration} min</Tag>
                          <Tag color={w.intensity==="Hard"?C.red:w.intensity==="Medium"?C.yellow:C.green}>{w.intensity}</Tag>
                          <Tag color={C.textMuted}>{w.calories} kcal</Tag>
                        </div>
                      </div>
                    </div>
                  </Card>
                ))}
              </div>
            )}

            {tab === "stats" && (
              <div style={{ display:"flex",flexDirection:"column",gap:14 }}>
                <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12 }}>
                  {[{ l:"Active Mins",v:`${totalMinsWeek}m`,sub:"this week",c:C.orange },{ l:"Cals Burned",v:totalCalsWeek,sub:"this week",c:C.red },{ l:"Sessions",v:state.workouts.length,sub:"total logged",c:C.green },{ l:"Best Streak",v:`${bestStreak} ${bestStreak===1?"day":"days"}`,sub:"consecutive",c:C.blue }].map(s => (
                    <Card key={s.l} style={{ textAlign:"center",padding:16 }}>
                      <div style={{ fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:s.c }}>{s.v}</div>
                      <div style={{ fontSize:11,color:C.text,fontWeight:600,marginTop:2 }}>{s.l}</div>
                      <div style={{ fontSize:10,color:C.textMuted }}>{s.sub}</div>
                    </Card>
                  ))}
                </div>
                <Card>
                  <div className="section-title">Weekly Activity</div>
                  <div style={{ display:"flex",gap:6,alignItems:"flex-end",height:80 }}>
                    {weekChart.map((entry,i) => (
                      <div key={i} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                        {entry.mins>0 && <div style={{ fontSize:8,color:C.orange }}>{entry.mins}m</div>}
                        <div style={{ width:"100%",background:entry.mins>0?C.grad:"rgba(255,255,255,0.05)",borderRadius:"4px 4px 0 0",height:`${Math.max(entry.mins>0?8:4,(entry.mins/120)*70)}px` }} />
                        <div style={{ fontSize:9,color:C.textMuted }}>{entry.day}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display:"flex",justifyContent:"space-between",marginTop:12,fontSize:12,color:C.textMuted }}>
                    <span>Goal: 150 min/week</span>
                    <span style={{ color:totalMinsWeek>=150?C.green:C.orange,fontWeight:700 }}>{totalMinsWeek}/150 min</span>
                  </div>
                  <ProgressBar value={totalMinsWeek} max={150} color={totalMinsWeek>=150?C.green:C.orange} height={5} />
                </Card>
                <Card>
                  <div className="section-title">Favourite Workouts</div>
                  {WORKOUT_TYPES.slice(0,4).map((wt,i) => {
                    const count = state.workouts.filter(w => w.type===wt.type).length;
                    const maxC  = Math.max(...WORKOUT_TYPES.map(w => state.workouts.filter(x=>x.type===w.type).length),1);
                    return (
                      <div key={wt.type} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<3?`1px solid ${C.border}`:"none" }}>
                        <span style={{ fontSize:22 }}>{wt.emoji}</span>
                        <div style={{ flex:1 }}>
                          <div style={{ display:"flex",justifyContent:"space-between",marginBottom:4 }}>
                            <span style={{ fontSize:13,color:C.text,fontWeight:600 }}>{wt.type}</span>
                            <span style={{ fontSize:12,color:C.textMuted }}>{count}x</span>
                          </div>
                          <ProgressBar value={count} max={maxC} color={C.orange} height={4} />
                        </div>
                      </div>
                    );
                  })}
                </Card>
              </div>
            )}
          </div>
        </Screen>
      );
    }

    // ─── SLEEP SCREEN ─────────────────────────────────────────────────────────
    function SleepScreen({ state }) {
      // ALL hooks declared unconditionally (Rules of Hooks)
      const [bedtime,  setBedtime]  = useState("23:00");
      const [waketime, setWaketime] = useState("07:00");
      const [quality,  setQuality]  = useState(0);
      const [saved,    setSaved]    = useState(false);
      const [syncing,  setSyncing]  = useState(false);
      const [lastSync, setLastSync] = useState(() => {
        try { return localStorage.getItem('orbit_lastSync') || null; } catch { return null; }
      });

      const hasDevice = state.user?.device && state.user.device !== "No, I don't have one";

      // ── LOCKED STATE ────────────────────────────────────────────────────────
      if (!hasDevice) {
        return (
          <Screen>
            <div style={{ padding:"56px 24px 100px",display:"flex",flexDirection:"column",alignItems:"center",textAlign:"center",minHeight:"80vh",justifyContent:"center" }}>
              <div style={{ fontSize:72,marginBottom:20,filter:"grayscale(0.3)" }}>⌚</div>
              <h1 style={{ fontFamily:"'Syne',sans-serif",fontSize:24,fontWeight:800,color:C.text,marginBottom:12 }}>Sleep Tracking Locked</h1>
              <p style={{ fontSize:14,color:C.textMuted,lineHeight:1.7,maxWidth:280,marginBottom:28 }}>
                Accurate sleep data requires a wearable. We never guess or estimate — that would be misleading.
              </p>
              <Card style={{ width:"100%",background:"rgba(255,140,66,0.04)",borderColor:"rgba(255,140,66,0.2)",marginBottom:24 }}>
                <div style={{ fontSize:12,color:C.textMuted,marginBottom:14 }}>Supported devices:</div>
                {[["⌚","Apple Watch","HealthKit sync"],["💪","Whoop","Auto-sync"],["⌚","Fitbit / Garmin","Auto-sync"],["📱","Other tracker","Manual import"]].map(([ic,name,sub]) => (
                  <div key={name} style={{ display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.border}` }}>
                    <div style={{ width:36,height:36,borderRadius:10,background:"rgba(255,140,66,0.1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18 }}>{ic}</div>
                    <div style={{ flex:1,textAlign:"left" }}>
                      <div style={{ fontSize:13,color:C.text,fontWeight:600 }}>{name}</div>
                      <div style={{ fontSize:11,color:C.textMuted }}>{sub}</div>
                    </div>
                    <div style={{ fontSize:11,color:C.green,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>✓</div>
                  </div>
                ))}
              </Card>
              <button className="btn-press" onClick={() => state.setActiveTab("progress")}
                style={{ background:C.grad,border:"none",borderRadius:14,padding:"16px 36px",color:"#fff",fontSize:15,fontFamily:"'Syne',sans-serif",fontWeight:700,cursor:"pointer",marginBottom:20,width:"100%",maxWidth:320 }}>
                ⚙️ Update Device in Settings
              </button>
              <div style={{ fontSize:11,color:C.textDim,lineHeight:1.6 }}>
                Go to Progress → Profile to change your device.<br/>A native app with real device sync is coming soon.
              </div>
            </div>
          </Screen>
        );
      }

      // ── WITH-DEVICE STATE ────────────────────────────────────────────────────

      const deviceName = state.user.device;
      const deviceIcon = deviceName === "Apple Watch" ? "⌚" : deviceName === "Whoop" ? "💪" : deviceName.includes("Fitbit") || deviceName.includes("Garmin") ? "⌚" : "📱";

      const calcHours = (bed, wake) => {
        const [bh,bm] = bed.split(":").map(Number);
        const [wh,wm] = wake.split(":").map(Number);
        let bMins = bh*60+bm, wMins = wh*60+wm;
        if (wMins <= bMins) wMins += 1440;
        return Math.round((wMins-bMins)/6)/10;
      };

      const hours = calcHours(bedtime, waketime);
      const sleepScore = Math.min(100, Math.round((Math.min(hours/8,1)*60) + (quality/5*40)));
      const scoreColor = sleepScore>=80?C.green:sleepScore>=60?C.blue:sleepScore>=40?C.yellow:C.red;

      const logSleep = () => {
        if (quality===0) return;
        const entry = { id:Date.now(), bedtime, wake:waketime, duration:hours, quality, date:"Last night" };
        state.setSleepLogs(prev => [entry, ...prev]);
        state.setTodaySleep(entry);
        setSaved(true);
        setTimeout(() => setSaved(false), 2200);
      };

      const handleSync = () => {
        setSyncing(true);
        setTimeout(() => {
          const now = new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
          setLastSync(now);
          try { localStorage.setItem('orbit_lastSync', now); } catch {}
          setSyncing(false);
        }, 1800);
      };

      const avgHours   = state.sleepLogs.length ? Math.round(state.sleepLogs.reduce((s,l)=>s+l.duration,0)/state.sleepLogs.length*10)/10 : 0;
      const avgQuality = state.sleepLogs.length ? Math.round(state.sleepLogs.reduce((s,l)=>s+l.quality,0)/state.sleepLogs.length*10)/10 : 0;
      const sleepDebt  = Math.max(0, Math.round((8-avgHours)*7*10)/10);
      const displayLogs = state.sleepLogs.slice(0,7);

      return (
        <Screen>
          <div style={{ padding:"56px 20px 20px" }}>
            <h1 style={{ fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:C.text,marginBottom:16 }}>Sleep 🌙</h1>

            {/* Device sync banner */}
            <Card style={{ marginBottom:14,background:"rgba(78,203,141,0.05)",borderColor:"rgba(78,203,141,0.2)" }}>
              <div style={{ display:"flex",alignItems:"center",gap:12 }}>
                <div style={{ width:40,height:40,borderRadius:12,background:"rgba(78,203,141,0.12)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0 }}>{deviceIcon}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13,color:C.text,fontWeight:600 }}>{deviceName} Connected</div>
                  <div style={{ fontSize:11,color:C.textMuted }}>{lastSync ? `Last synced: ${lastSync}` : "Not synced yet — tap to sync"}</div>
                </div>
                <button className="btn-press" onClick={handleSync} disabled={syncing}
                  style={{ background:syncing?"rgba(255,255,255,0.05)":C.grad,border:"none",borderRadius:10,padding:"8px 14px",color:"#fff",fontSize:12,fontFamily:"'Syne',sans-serif",fontWeight:700,cursor:"pointer",flexShrink:0,opacity:syncing?0.7:1 }}>
                  {syncing ? "⟳ Syncing…" : "↻ Sync"}
                </button>
              </div>
              <div style={{ fontSize:11,color:C.textMuted,marginTop:10,lineHeight:1.5,borderTop:`1px solid rgba(255,255,255,0.05)`,paddingTop:10 }}>
                ℹ️ Real-time sync requires the native app. Log manually below until then.
              </div>
            </Card>

            {/* Sleep score card */}
            <Card glow={scoreColor} style={{ marginBottom:14 }}>
              <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center" }}>
                <div>
                  <div className="section-title">Sleep Score</div>
                  <div style={{ fontFamily:"'Syne',sans-serif",fontSize:52,fontWeight:800,color:scoreColor,lineHeight:1 }}>{sleepScore}</div>
                  <div style={{ fontSize:12,color:C.textMuted,marginTop:6,maxWidth:190 }}>
                    {sleepScore>=80?"🌟 Excellent — well rested!":sleepScore>=60?"😊 Good — keep it up":sleepScore>=40?"😐 Fair — try for 7–8 hrs":"😓 Poor — early bedtime tonight?"}
                  </div>
                </div>
                <Ring value={sleepScore} size={90} color={scoreColor} label={`${sleepScore}`} sublabel="score" />
              </div>
            </Card>

            {/* Time pickers */}
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14 }}>
              {[{ label:"🌙 Bedtime",val:bedtime,set:setBedtime },{ label:"☀️ Wake Up",val:waketime,set:setWaketime }].map(f => (
                <div key={f.label}>
                  <div style={{ fontSize:12,color:C.textMuted,marginBottom:8,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{f.label}</div>
                  <input type="time" value={f.val} onChange={e => f.set(e.target.value)}
                    style={{ width:"100%",background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px",color:C.text,fontSize:22,fontFamily:"'Syne',sans-serif",fontWeight:700,outline:"none",textAlign:"center" }} />
                </div>
              ))}
            </div>

            {/* Duration */}
            <Card style={{ marginBottom:14,textAlign:"center" }}>
              <div style={{ fontFamily:"'Syne',sans-serif",fontSize:40,fontWeight:800,color:hours>=7?C.green:hours>=6?C.yellow:C.red }}>{hours}h</div>
              <div style={{ fontSize:12,color:C.textMuted,marginBottom:10 }}>sleep duration · Goal: 8h</div>
              <ProgressBar value={hours} max={10} color={hours>=7?C.green:hours>=6?C.yellow:C.red} height={6} />
            </Card>

            {/* Quality rating */}
            <Card style={{ marginBottom:14 }}>
              <div className="section-title">Sleep Quality</div>
              <div style={{ display:"flex",justifyContent:"center",gap:14 }}>
                {[1,2,3,4,5].map(n => (
                  <button key={n} className="btn-press" onClick={() => setQuality(quality===n?0:n)}
                    style={{ background:"none",border:"none",cursor:"pointer",fontSize:30,filter:n<=quality?"none":"grayscale(1) opacity(0.3)",transform:n<=quality?"scale(1.15)":"scale(1)",transition:"all 0.2s" }}>
                    🌙
                  </button>
                ))}
              </div>
              <div style={{ textAlign:"center",fontSize:12,color:C.textMuted,marginTop:8 }}>
                {quality===0?"Tap moons to rate":quality<=2?"Restless night 😓":quality<=3?"Okay sleep 😐":quality<=4?"Good sleep 😊":"Perfect night! 🌟"}
              </div>
            </Card>

            {saved
              ? <div style={{ background:"rgba(78,203,141,0.1)",border:`1px solid rgba(78,203,141,0.3)`,borderRadius:14,padding:15,textAlign:"center",color:C.green,fontFamily:"'Syne',sans-serif",fontWeight:700,marginBottom:14,animation:"fadeIn 0.3s ease" }}>🌙 Sleep logged!</div>
              : <GradBtn grad={C.gradBlue} onClick={logSleep} style={{ marginBottom:14 }} disabled={quality===0}>{quality===0?"Rate your sleep first":"Log Tonight's Sleep"}</GradBtn>
            }

            {/* 7-night chart */}
            <Card style={{ marginBottom:14 }}>
              <div className="section-title">7-Night History</div>
              {displayLogs.length === 0
                ? <div style={{ textAlign:"center",padding:"20px 0",color:C.textMuted,fontSize:13 }}>🌙 No sleep logged yet. Log your first night above.</div>
                : <div style={{ display:"flex",gap:6,alignItems:"flex-end",height:90 }}>
                    {displayLogs.slice().reverse().map((log,i) => (
                      <div key={log.id} style={{ flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4 }}>
                        <div style={{ fontSize:8,color:log.duration>=7?C.green:C.yellow,fontFamily:"'Syne',sans-serif",fontWeight:700 }}>{log.duration}h</div>
                        <div style={{ width:"100%",background:log.duration>=7?C.blue:log.duration>=6?C.yellow:C.red,borderRadius:"4px 4px 0 0",height:`${(log.duration/10)*70}px`,opacity:0.8 }} />
                        <div style={{ fontSize:8,color:C.textMuted }}>{"SMTWTFS"[i]}</div>
                      </div>
                    ))}
                  </div>
              }
            </Card>

            {/* Averages row */}
            <div style={{ display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10 }}>
              {[{ l:"Avg Hours",v:`${avgHours}h`,c:C.blue },{ l:"Avg Quality",v:`${avgQuality}/5 🌙`,c:C.yellow },{ l:"Sleep Debt",v:`${sleepDebt}h`,c:sleepDebt>5?C.red:sleepDebt>2?C.yellow:C.green }].map(s => (
                <Card key={s.l} style={{ textAlign:"center",padding:12 }}>
                  <div style={{ fontFamily:"'Syne',sans-serif",fontSize:16,fontWeight:800,color:s.c }}>{s.v}</div>
                  <div style={{ fontSize:10,color:C.textMuted,marginTop:2 }}>{s.l}</div>
                </Card>
              ))}
            </div>
          </div>
        </Screen>
      );
    }

    // ─── QUICK-ADD FAB ────────────────────────────────────────────────────────
    function QuickAddFAB({ state }) {
      const [open, setOpen] = useState(false);
      const [mode, setMode] = useState(null);
      const [inputVal, setInputVal] = useState("");
      const [toast, setToast] = useState(null);
      const toastRef = useRef();

      const showToast = (msg, color = C.green) => {
        clearTimeout(toastRef.current);
        setToast({ msg, color });
        toastRef.current = setTimeout(() => setToast(null), 2500);
      };

      useEffect(() => () => clearTimeout(toastRef.current), []);

      const actions = [
        { id: "mood", emoji: "😊", label: "Log Mood",  color: C.yellow },
        { id: "task", emoji: "✅", label: "Add Task",   color: C.green  },
        { id: "meal", emoji: "🍽️", label: "Log Meal",  color: C.orange },
        { id: "water",emoji: "💧", label: "Water +1",  color: C.blue   },
      ];

      const close = () => { setOpen(false); setMode(null); setInputVal(""); };

      const handleAction = (id) => {
        setOpen(false);
        if (id === "water") {
          const next = Math.min(state.water + 1, state.waterGoal);
          state.setWater(next);
          showToast(`💧 ${next}/${state.waterGoal} glasses — great work!`, C.blue);
        } else {
          setMode(id);
        }
      };

      const submitTask = () => {
        if (!inputVal.trim()) return;
        state.setTasks(prev => [...prev, { id: Date.now(), text: inputVal, done: false, priority: "medium", time: "30 min" }]);
        showToast("✅ Task added!", C.green);
        close();
      };

      const submitMeal = () => {
        if (!inputVal.trim()) return;
        state.setMeals(prev => [...prev, { id: Date.now(), name: inputVal, calories: 300, macros: { p: 10, c: 40, f: 10 }, quality: "mixed", time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) }]);
        showToast("🍽️ Meal logged! (~300 kcal)", C.orange);
        close();
      };

      const MOODS = [
        { emoji: "😄", label: "Great",   score: 90 },
        { emoji: "🙂", label: "Good",    score: 70 },
        { emoji: "😐", label: "Okay",    score: 50 },
        { emoji: "😔", label: "Low",     score: 30 },
        { emoji: "😰", label: "Anxious", score: 15 },
      ];

      return (
        <>
          {/* ── Toast ── */}
          {toast && (
            <div style={{ position: "fixed", top: 56, left: "50%", transform: "translateX(-50%)", background: "rgba(12,12,20,0.96)", border: `1px solid ${toast.color}40`, borderRadius: 100, padding: "11px 22px", color: C.text, fontSize: 13, fontFamily: "'Syne',sans-serif", fontWeight: 700, zIndex: 3000, animation: "slideDown 0.3s ease", whiteSpace: "nowrap", backdropFilter: "blur(16px)", boxShadow: `0 4px 24px ${toast.color}25` }}>
              {toast.msg}
            </div>
          )}

          {/* ── Backdrop ── */}
          {(open || mode) && (
            <div onClick={close} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.55)", zIndex: 1500, backdropFilter: "blur(5px)" }} />
          )}

          {/* ── Action items ── */}
          {open && (
            <div style={{ position: "fixed", bottom: 162, right: 16, display: "flex", flexDirection: "column", gap: 10, alignItems: "flex-end", zIndex: 1600 }}>
              {actions.map((a, i) => (
                <div key={a.id} onClick={() => handleAction(a.id)} style={{ display: "flex", alignItems: "center", gap: 10, background: "rgba(14,14,26,0.97)", border: `1px solid ${a.color}35`, borderRadius: 100, padding: "10px 18px 10px 10px", cursor: "pointer", animation: `slideUp 0.25s ease ${i * 0.06}s both`, backdropFilter: "blur(12px)", boxShadow: `0 4px 20px rgba(0,0,0,0.3)` }}>
                  <div style={{ width: 34, height: 34, borderRadius: "50%", background: `${a.color}15`, border: `1px solid ${a.color}35`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17 }}>{a.emoji}</div>
                  <span style={{ fontSize: 13, fontFamily: "'Syne',sans-serif", fontWeight: 700, color: C.text, whiteSpace: "nowrap" }}>{a.label}</span>
                </div>
              ))}
            </div>
          )}

          {/* ── FAB button ── */}
          <button className="btn-press" onClick={() => { if (mode) { close(); } else { setOpen(v => !v); } }} style={{ position: "fixed", bottom: 100, right: 16, width: 54, height: 54, borderRadius: "50%", background: open ? "rgba(255,255,255,0.08)" : C.grad, border: open ? `1px solid ${C.border}` : "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", zIndex: 1700, fontSize: 26, color: "#fff", boxShadow: open ? "none" : "0 4px 24px rgba(255,140,66,0.45)", transition: "all 0.3s cubic-bezier(0.34,1.56,0.64,1)", transform: open ? "rotate(45deg) scale(1.05)" : "rotate(0deg) scale(1)" }}>
            +
          </button>

          {/* ── Bottom sheets ── */}
          {mode && (
            <div style={{ position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)", width: "100%", maxWidth: 430, background: "rgba(12,12,22,0.99)", border: `1px solid ${C.border}`, borderRadius: "24px 24px 0 0", padding: "28px 20px 44px", zIndex: 2000, animation: "slideUp 0.35s cubic-bezier(0.34,1.2,0.64,1)", backdropFilter: "blur(20px)" }}>

              {/* ── Task sheet ── */}
              {mode === "task" && (
                <>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 6 }}>✅ Quick Add Task</div>
                  <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 18 }}>It'll land in your task list instantly</div>
                  <input autoFocus value={inputVal} onChange={e => setInputVal(e.target.value)} onKeyDown={e => e.key === "Enter" && submitTask()} placeholder="What needs to get done?"
                    style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", color: C.text, fontSize: 14, outline: "none", marginBottom: 14 }} />
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={close} style={{ flex: 1, padding: "13px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, color: C.textMuted, cursor: "pointer", fontSize: 13 }}>Cancel</button>
                    <GradBtn onClick={submitTask} style={{ flex: 2 }} disabled={!inputVal.trim()}>Add Task</GradBtn>
                  </div>
                </>
              )}

              {/* ── Meal sheet ── */}
              {mode === "meal" && (
                <>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 6 }}>🍽️ Quick Log Meal</div>
                  <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 18 }}>Describe what you ate — calories auto-estimated</div>
                  <input autoFocus value={inputVal} onChange={e => setInputVal(e.target.value)} onKeyDown={e => e.key === "Enter" && submitMeal()} placeholder="e.g. Rice and dal, large bowl"
                    style={{ width: "100%", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", color: C.text, fontSize: 14, outline: "none", marginBottom: 14 }} />
                  <div style={{ display: "flex", gap: 10 }}>
                    <button onClick={close} style={{ flex: 1, padding: "13px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, color: C.textMuted, cursor: "pointer", fontSize: 13 }}>Cancel</button>
                    <GradBtn onClick={submitMeal} style={{ flex: 2 }} disabled={!inputVal.trim()}>Log Meal</GradBtn>
                  </div>
                </>
              )}

              {/* ── Mood sheet ── */}
              {mode === "mood" && (
                <>
                  <div style={{ fontFamily: "'Syne',sans-serif", fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 6 }}>How are you feeling right now?</div>
                  <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 24 }}>Tap to log your mood in one second</div>
                  <div style={{ display: "flex", justifyContent: "space-around", marginBottom: 24 }}>
                    {MOODS.map(m => (
                      <button key={m.emoji} className="btn-press" onClick={() => {
                        state.setTodayMood(m.score);
                        state.setMoodLog(prev => { const n=[...prev]; n[n.length-1]=m.score; return n; });
                        showToast(`${m.emoji} ${m.label} mood logged!`, C.yellow); close();
                      }}
                        style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, background: "none", border: "none", cursor: "pointer", padding: 0 }}>
                        <div style={{ width: 56, height: 56, borderRadius: "50%", background: C.surface, border: `1px solid ${C.border}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, transition: "all 0.15s" }}>{m.emoji}</div>
                        <span style={{ fontSize: 10, color: C.textMuted, fontFamily: "'Syne',sans-serif", fontWeight: 700 }}>{m.label}</span>
                      </button>
                    ))}
                  </div>
                  <button onClick={close} style={{ width: "100%", padding: "13px", background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, color: C.textMuted, cursor: "pointer", fontSize: 13 }}>Cancel</button>
                </>
              )}

            </div>
          )}
        </>
      );
    }

    // ─── TAB BAR ──────────────────────────────────────────────────────────────
    function TabBar({ active, onChange, notifications }) {
      const unread = notifications.filter(n => !n.read).length;
      const tabs = [
        { id: "home",         emoji: "🏠", label: "Home"    },
        { id: "assistant",    emoji: "🎙️", label: "AI"      },
        { id: "health",       emoji: "💚", label: "Health"  },
        { id: "productivity", emoji: "⚡", label: "Tasks"   },
        { id: "journal",      emoji: "📓", label: "Journal" },
        { id: "workout",      emoji: "🏋️", label: "Workout" },
        { id: "sleep",        emoji: "🌙", label: "Sleep"   },
        { id: "progress",     emoji: "📈", label: "Progress"},
        { id: "community",    emoji: "🤝", label: "Friends" },
        { id: "achievements", emoji: "🏆", label: "Awards"  },
      ];
      return (
        <div className="tab-bar" style={{ overflowX: "auto" }}>
          {tabs.map(t => (
            <button key={t.id} className="tab-item btn-press" onClick={() => onChange(t.id)}
              style={{ color: active === t.id ? C.orange : "rgba(255,255,255,0.35)" }}>
              <span className="tab-icon" style={{ position: "relative" }}>
                {t.emoji}
                {t.id === "home" && unread > 0 && (
                  <span style={{ position: "absolute", top: -4, right: -4, width: 8, height: 8, borderRadius: "50%", background: C.red }} />
                )}
              </span>
              <span className="tab-label">{t.label}</span>
            </button>
          ))}
        </div>
      );
    }

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    function App() {
      const [onboarded, setOnboarded] = useState(() => !!localStorage.getItem('orbit_onboarded'));
      const state = useAppState();

      const handleOnboardComplete = (answers) => {
        state.setUser(answers);
        localStorage.setItem('orbit_onboarded', '1');
        // increment streak on first open
        state.setStreak(1);
        setOnboarded(true);
      };

      // Daily reset + streak tracking — runs once on app open
      useEffect(() => {
        if (!onboarded) return;
        const today = new Date().toDateString();
        const lastOpen = localStorage.getItem('orbit_lastOpen');
        if (lastOpen && lastOpen !== today) {
          // Save today's score before resetting so HomeScreen can show the delta tomorrow
          try { localStorage.setItem('orbit_prevLifeScore', String(state.lifeScore)); } catch {}
          // It's a new day — reset daily fields
          state.setHabits(prev => prev.map(h => ({ ...h, done: false })));
          state.setWater(0);
          state.setTodayMood(null);
          state.setTodayStress(null);
          state.setTodaySleep(null);
          // Shift 7-day log arrays forward (drop oldest, keep shape)
          state.setMoodLog(prev => [...prev.slice(1), prev[prev.length - 1] ?? 65]);
          state.setStressLog(prev => [...prev.slice(1), prev[prev.length - 1] ?? 5]);
          state.setCalorieLog(prev => [...prev.slice(1), 0]);
          // Streak logic
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          if (lastOpen === yesterday) {
            state.setStreak(s => s + 1);
          } else {
            state.setStreak(1); // gap → reset
          }
        }
        localStorage.setItem('orbit_lastOpen', today);
      }, [onboarded]);

      if (!onboarded) return <OnboardingFlow onComplete={handleOnboardComplete} />;

      const renderScreen = () => {
        switch (state.activeTab) {
          case "home":         return <HomeScreen state={state} />;
          case "assistant":   return <VoiceScreen state={state} />;
          case "health":      return <HealthScreen state={state} />;
          case "productivity":return <ProductivityScreen state={state} />;
          case "journal":     return <JournalScreen state={state} />;
          case "workout":     return <WorkoutScreen state={state} />;
          case "sleep":       return <SleepScreen state={state} />;
          case "achievements":return <AchievementsScreen state={state} />;
          case "community":   return <CommunityScreen state={state} />;
          case "progress":    return <ProgressScreen state={state} />;
          default:            return <HomeScreen state={state} />;
        }
      };

      return (
        <div style={{ maxWidth: 430, margin: "0 auto", position: "relative" }}>
          <GlobalStyles />
          {renderScreen()}
          <QuickAddFAB state={state} />
          <TabBar active={state.activeTab} onChange={state.setActiveTab} notifications={state.notifications} />
        </div>
      );
    }

    // ─── RENDER ───────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
